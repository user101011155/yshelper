<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 텍스트 게임 도우미</title>
<link rel="stylesheet" as="style" crossorigin href="https://spoqa.github.io/spoqa-han-sans/css/SpoqaHanSansNeo.css">
<style>
  :root{
    --bg: #f2f2f7;
    --bg-2: #e8e8ee;
    --card: #ffffff;
    --card-2: #f2f2f7;
    --line: rgba(0,0,0,0.08);
    --text: #1c1c1e;
    --muted: #6e6e76;
    --accent: #007aff;
    --accent-dim: rgba(0,122,255,0.10);
    --mafia: #e0483a;
    --mafia-dim: rgba(224,72,58,0.12);
    --gold: #b8860b;
    --citizen: #2f7fd6;
    --special: #2f9e6b;
    --paper: #ffffff;
    --shadow: 0 8px 24px rgba(0,0,0,0.10);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Spoqa Han Sans Neo', sans-serif;transition:background .2s,color .2s;}
  .app{display:flex;flex-direction:column;min-height:100vh;align-items:center;}
  /* Top bar */
  .topbar{width:100%;background:var(--bg);background:color-mix(in srgb, var(--bg) 70%, transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:14px 0;position:sticky;top:0;z-index:20;}
  .topbar-inner{max-width:1040px;margin:0 auto;padding:0 44px;display:flex;align-items:center;justify-content:space-between;}
  .brand-eyebrow{font-family:'Spoqa Han Sans Neo', sans-serif;font-size:10px;color:var(--accent);letter-spacing:2px;}
  .brand-title{font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;font-size:18px;margin-top:2px;}
  .steps{display:flex;align-items:center;gap:14px;flex-shrink:0;}
  .step-dot{width:8px;height:8px;min-width:8px;min-height:8px;aspect-ratio:1/1;border-radius:50%;background:var(--line);flex-shrink:0;}
  .step-dot.done{background:var(--accent);opacity:0.5;}
  .step-dot.current{background:var(--accent);width:10px;height:10px;min-width:10px;min-height:10px;box-shadow:0 0 0 4px var(--accent-dim);}
  .step-label{font-family:'Spoqa Han Sans Neo', sans-serif;font-size:11px;color:var(--muted);letter-spacing:1px;}
  .dealer-name-input{width:100%;max-width:280px;background:var(--card-2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:8px 12px;font-size:13px;font-family:'Spoqa Han Sans Neo', sans-serif;margin-top:8px;}

  /* Main */
  .main{width:100%;flex:1;padding:36px 44px 100px;max-width:1040px;}
  .page-title{font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;font-size:28px;margin:0 0 24px;letter-spacing:-0.3px;}
  .game-label{display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin-bottom:12px;}
  .page-sub{color:var(--muted);font-size:14px;margin-bottom:28px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:var(--shadow);text-align:left;}
  .card h3{margin-top:0;font-family:'Spoqa Han Sans Neo', sans-serif;font-size:16px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));gap:16px;margin-top:24px;}
  .badge{font-family:'Spoqa Han Sans Neo', sans-serif;font-size:10px;padding:2px 8px;border-radius:10px;letter-spacing:1px;}
  .badge.ready{background:rgba(82,199,143,0.15);color:var(--special);border:1px solid var(--special);}
  .badge.soon{background:rgba(154,154,162,0.12);color:var(--muted);border:1px solid var(--muted);}
  .game-card{cursor:pointer;transition:border-color .15s, transform .15s, box-shadow .15s;border-radius:14px;display:flex;align-items:center;justify-content:center;text-align:center;width:100%;aspect-ratio:2/1;min-height:auto;padding:8px;overflow:hidden;}
  .game-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .game-card.disabled{cursor:default;opacity:0.5;}
  .game-card.disabled:hover{border-color:var(--line);transform:none;}
  .game-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim), var(--shadow);}
  .game-card h4{margin:0;font-family:'Spoqa Han Sans Neo', sans-serif;font-size:clamp(11px, 2.6vw, 16px);line-height:1.3;}
  .game-card p{display:none;}
  .fab-next{position:fixed;bottom:32px;right:40px;box-shadow:var(--shadow);z-index:10;border-radius:24px;}
  .fab-back{position:fixed;bottom:32px;left:40px;box-shadow:var(--shadow);z-index:10;border-radius:24px;}

  html, body{overflow-x:hidden;}
  .app{overflow-x:hidden;max-width:100vw;}

  button{font-family:'Spoqa Han Sans Neo', sans-serif;background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:20px;font-weight:700;cursor:pointer;font-size:14px;transition:filter .15s, transform .1s;}
  button:hover{filter:brightness(1.08);}
  button:active{transform:scale(0.97);}
  button.secondary{background:var(--card-2);border:1px solid var(--line);color:var(--text);}
  button.secondary:hover{filter:brightness(1.1);}
  button.danger{background:var(--mafia);}
  button:disabled{opacity:0.35;cursor:not-allowed;}
  input[type=text], input[type=number], textarea, select{
    width:100%;background:var(--bg-2);border:1px solid var(--line);color:var(--text);
    padding:10px 12px;border-radius:10px;font-family:'Spoqa Han Sans Neo', sans-serif;font-size:14px;
  }
  textarea{min-height:120px;resize:vertical;font-family:'Spoqa Han Sans Neo', sans-serif;line-height:1.6;}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;margin-top:14px;font-weight:700;}

  .role-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:6px 14px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;text-align:left;}
  .role-row:last-child{border-bottom:none;}
  .role-row > *{min-width:0;overflow-wrap:break-word;word-break:break-word;text-align:left;}
  .role-tag{font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;padding:3px 10px;border-radius:6px;font-size:12px;}
  .role-tag.mafia{background:var(--mafia-dim);color:var(--mafia);}
  .role-tag.citizen{background:rgba(100,181,246,0.15);color:var(--citizen);}
  .role-tag.special{background:rgba(242,185,61,0.15);color:var(--gold);}

  /* count buttons (인원 설정) */
  .count-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  @media (max-width:600px){ .count-grid{grid-template-columns:repeat(2,1fr);} }
  .num-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px;}
  .num-btn{background:var(--card-2);border:1px solid var(--line);border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;font-family:'JetBrains Mono','Spoqa Han Sans Neo',monospace;transition:all .12s;}
  .num-btn:hover{border-color:var(--accent);}
  .num-btn .num{font-weight:700;font-size:15px;}
  .num-btn .cardname{font-size:10px;color:var(--muted);margin-top:2px;}
  .num-btn.dm-playable{border-color:var(--special);box-shadow:0 0 0 1px var(--special) inset;}
  .num-btn.dm-playable .num{color:var(--special);}
  .num-btn.dm-disabled{opacity:0.35;cursor:not-allowed;}
  .backs-box{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:2px;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;line-height:1.8;word-break:break-all;}
  .count-btn{background:var(--card-2);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:16px 0;font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;font-size:16px;cursor:pointer;text-align:center;transition:all .12s;}
  .count-btn:hover{border-color:var(--accent);}
  .count-btn.selected{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}

  /* 참가자 결과 리스트 (즉시 확인) */
  .result-list{display:flex;flex-direction:column;gap:0;}
  .result-row{display:flex;align-items:center;gap:14px;padding:12px 4px;border-bottom:1px solid var(--line);}
  .result-row:last-child{border-bottom:none;}
  .result-row.dead{opacity:0.4;}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .result-name{font-weight:700;font-size:14px;min-width:90px;}
  .result-spacer{flex:1;}
  .status-chip{font-size:11px;color:var(--mafia);border:1px solid var(--mafia);border-radius:8px;padding:1px 8px;}

  .phase-banner{background:var(--card-2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px;}
  .phase-banner .phase-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .phase-banner .dot{width:11px;height:11px;border-radius:50%;background:var(--gold);flex-shrink:0;}
  .phase-banner.night .dot{background:var(--accent);}
  .phase-banner .ptitle{font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;font-size:19px;}
  .phase-banner .psub{color:var(--muted);font-size:13px;}
  .roster-bar{display:flex;flex-wrap:wrap;gap:8px;padding-top:12px;border-top:1px solid var(--line);}
  .roster-chip{font-size:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:5px 10px;display:flex;gap:6px;align-items:center;}
  .roster-chip.dead{opacity:0.4;text-decoration:line-through;}
  .roster-chip b{font-family:'Spoqa Han Sans Neo', sans-serif;}

  .log{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;max-height:280px;overflow-y:auto;font-family:'Spoqa Han Sans Neo', sans-serif;font-size:13px;line-height:1.8;}
  .log .entry{border-bottom:1px solid var(--line);padding:5px 0;}
  .log .entry.hl{color:var(--gold);font-weight:700;}
  .log .day-mark{color:var(--accent);font-weight:700;margin-top:10px;display:block;font-size:12px;}

  .vote-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .vote-btn{background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:16px 10px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;}
  .vote-btn:hover{border-color:var(--mafia);}
  .vote-btn.selected{background:var(--mafia-dim);border-color:var(--mafia);color:var(--mafia);box-shadow:0 0 0 1px var(--mafia) inset;}
  .vote-btn.dead{opacity:0.3;cursor:not-allowed;}

  .winner-banner{background:linear-gradient(135deg, var(--mafia), #a83226);padding:26px;border-radius:16px;text-align:center;margin-bottom:20px;color:#fff;}
  .winner-banner.citizen{background:linear-gradient(135deg, var(--citizen), #2f5f8f);}
  .winner-banner h2{font-family:'Spoqa Han Sans Neo', sans-serif;font-size:24px;margin:0 0 6px;}
  .winner-banner p{margin:0;opacity:0.85;font-size:13px;}

  .rule-text{font-size:14px;line-height:1.8;color:var(--muted);}
  .rule-text b{color:var(--accent);}
  .divider{border:none;border-top:1px solid var(--line);margin:20px 0;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .small-muted{font-size:12px;color:var(--muted);}
  .name-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .name-field{position:relative;}
  .name-field .name-no{position:absolute;left:10px;top:9px;font-family:'Spoqa Han Sans Neo', sans-serif;font-size:11px;color:var(--muted);}
  .name-field input{padding-left:34px;}

  /* 모바일 대응 (기본 규칙들 뒤에 위치해야 우선 적용됨) */
  @media (max-width:640px){
    .topbar-inner{padding:0 16px;}
    .main{padding:20px 16px 90px;}
    .page-title{font-size:22px;margin-bottom:16px;}
    .grid{gap:10px;margin-top:16px;}
    .card{padding:16px;border-radius:12px;}
    .fab-next{right:16px;bottom:16px;}
    .fab-back{left:16px;bottom:16px;}
    .brand-title{font-size:15px;}
    .brand-eyebrow{display:none;}
    .step-label{display:none;}
    .role-row{flex-direction:column;align-items:flex-start;gap:8px;}
    .role-row > div[style*="display:flex"]{width:100%;justify-content:flex-start;}
    select[style*="min-width"]{min-width:0 !important;width:100%;}
  }
  @media (max-width:400px){
    .grid{gap:6px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div data-action="goHome" style="cursor:pointer;">
        <div class="brand-title">🎮 텍스트 게임 도우미</div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="steps" id="stepsBar"></div>
      </div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
/* ================= 데이터 정의 ================= */
const GAMES = [
  {id:'mafia', name:'🎭 구 마피아', status:'ready', desc:'29가지 역할이 뒤섞이는 올드스쿨 마피아. 스파이·기생부터 도둑·인형사까지.'},
  {id:'newmafia', name:'🔫 신 마피아', status:'ready', desc:'스파이·좀도둑·연인·국회까지. 6~15명이 즐기는 신버전 마피아.'},
  {id:'onewolf', name:'🐺 원나잇 웨어울프', status:'ready', desc:'단 하룻밤, 단 한 번의 투표. 카드가 뒤바뀌는 짧고 강렬한 추리 게임.'},
  {id:'loveletter', name:'💌 러브 레터', status:'ready', desc:'단 한 장의 카드로 밀고 당기는 눈치싸움. 호감 토큰 3개를 먼저 모으면 승리.'},
  {id:'dalmuti', name:'👑 달무티', status:'ready', desc:'계급이 뒤바뀌는 카드 내려놓기 게임. 4~8명, 세금과 혁명까지 자동 관리.'},
];

const MAFIA_RULE_TEXT = `
<b>목표</b> — 마피아 팀(마피아·스파이·기생)은 시민 수를 마피아 팀 이하로 줄이면 승리하고, 시민 팀은 마피아 팀을 전원 처형하면 승리합니다.<br><br>
<b>진행</b> — 밤과 낮이 번갈아 진행됩니다. 밤에는 능력을 가진 역할들이 순서대로 행동하고, 낮에는 생존자 전원이 토론 후 투표로 한 명을 처형합니다.<br><br>
<b>밤 행동 순서</b> — 기생 → 스파이 → 마피아 → 의사 → 경찰 → 탐정 → 명탐정 → 무당 → 택시기사 → 건달 → 도둑 순으로 딜러가 입력을 받습니다. (인형사·게이의 생존은 자동 계산됩니다)<br><br>
<b>자동화 범위</b> — 아래 목록의 역할은 능력이 자동으로 계산됩니다. 그 외 역할(정치인·저격수·백수·테러리스트·영매·혁명군·부자·개·하녀·찍매·신병·환생사·간호사·오타쿠·판사)은 설명만 제공되며, 필요하면 딜러가 직접 부여하고 수동으로 진행해주세요.
`;

const ROLE_INFO = {
  '마피아': {team:'mafia', tag:'mafia', desc:'밤마다 한 명을 지목해 습격합니다.'},
  '스파이': {team:'citizen', tag:'mafia', desc:'밤마다 생존자 한 명의 직업을 확인합니다. 마피아를 확인하면 그 순간 마피아 팀에 합류합니다.'},
  '기생':   {team:'mafia', tag:'mafia', desc:'마피아 팀 소속. 밤마다 한 명을 지목해 그 사람의 밤 능력을 무효화합니다.'},
  '경찰':   {team:'citizen', tag:'special', desc:'밤마다 한 명을 조사합니다. "마피아" 역할만 마피아로 나오고, 나머지는 전부 시민으로 나옵니다.'},
  '의사':   {team:'citizen', tag:'special', desc:'밤마다 한 명을 치료합니다. 자힐도 가능하며, 마피아의 습격을 받았을 때만 효과가 있습니다.'},
  '탐정':   {team:'citizen', tag:'special', desc:'밤마다 스파이나 기생일 것 같은 사람을 지목합니다. 맞히면 명탐정으로 진급합니다.'},
  '명탐정': {team:'citizen', tag:'special', desc:'탐정이 진급한 역할. 밤마다 한 명을 지목해 이번 밤 누구의 능력을 받았는지 확인합니다.'},
  '무당':   {team:'citizen', tag:'special', desc:'밤마다 죽은 사람 한 명을 지목해 생전 직업을 확인합니다.'},
  '택시기사': {team:'citizen', tag:'special', desc:'밤마다 두 명을 지목합니다. 마피아의 습격이 둘 중 한 명에게 향하면 다른 한 명이 대신 죽습니다.'},
  '건달':   {team:'citizen', tag:'special', desc:'밤마다 한 명을 지목해 다음 낮 투표에서 처형 대상으로 선택되지 못하게 합니다.'},
  '도둑':   {team:'citizen', tag:'special', desc:'밤마다 한 명의 직업을 훔칩니다. 훔친 대상은 아무 능력 없는 시민이 됩니다.'},
  '인형사': {team:'citizen', tag:'special', desc:'마피아의 습격을 단 한 번, 인형의 희생으로 자동 생존합니다.'},
  '게이':   {team:'citizen', tag:'special', desc:'마피아의 습격을 한 번 자동으로 피하며, 기생의 능력이 통하지 않습니다.'},
  '시민':   {team:'citizen', tag:'citizen', desc:'특별한 능력이 없습니다. 토론과 투표로 마피아 팀을 색출해야 합니다.'},
  '정치인': {team:'citizen', tag:'special', desc:'낮 투표로는 죽지 않고 자동 생존하며, 그 대신 역할이 즉시 공개됩니다.'},
  '저격수': {team:'citizen', tag:'special', desc:'게임 중 1회 대상을 지목하면 직업이 공개되고, 다음 밤부터 저격(사살) 능력이 생깁니다.'},
  '백수':   {team:'citizen', tag:'special', desc:'게임에서 처음 죽은 사람의 직업을 그대로 이어받습니다.'},

function buildLLDeck(version, playerCount){
  const deck = [];
  ['병사','광대','기사','수녀','마법사','장군','후작','대신','공주'].forEach(name=>{
    for(let i=0;i<LL_CARD_INFO[name].count;i++) deck.push(name);
  });
  if(version === '2019'){
    for(let i=0;i<LL_CARD_INFO['첩자'].count;i++) deck.push('첩자');
    deck.push('수상');
  }
  if(playerCount === 5){
    deck.push('왕');
  }
  llShuffle(deck);
  return deck;
}

function llRandomFloat(){
  if(window.crypto && window.crypto.getRandomValues){
    const buf = new Uint32Array(1);
    window.crypto.getRandomValues(buf);
    return buf[0] / 4294967296; // 0 이상 1 미만
  }
  return Math.random();
}

function llShuffle(arr){
  // 카드 수가 적은 만큼(15~19장) 두 번 섞어 편향을 최소화
  for(let pass=0; pass<2; pass++){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(llRandomFloat()*(i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }
  return arr;
}

function save(){
  try{ localStorage.setItem('dealer_console_state', JSON.stringify(state)); }catch(e){}
}
function load(){
  try{
    const raw = localStorage.getItem('dealer_console_state');
    if(raw) state = Object.assign(state, JSON.parse(raw));
  }catch(e){}
  // 페이지를 새로 열 때는 이전 진행 상황과 상관없이 항상 홈 화면부터 시작한다
  state.tab = 'home';
}
load();

/* ================= 네비게이션 ================= */
const TAB_ORDER = ['home','setup','board','play'];
const TAB_LABEL = {home:'게임 목록', setup:'인원 설정', board:'딜러 보드', play:'진행'};

function setTab(t){ state.tab = t; render(); save(); }
function goBack(){
  const i = TAB_ORDER.indexOf(state.tab);
  if(i > 0) setTab(TAB_ORDER[i-1]);
}

function renderSteps(){
  const cur = TAB_ORDER.indexOf(state.tab);
  const dots = TAB_ORDER.map((t,i)=>{
    let cls = 'step-dot';
    if(i < cur) cls += ' done';
    if(i === cur) cls += ' current';
    return `<span class="${cls}"></span>`;
  }).join('');
  return `${dots}<span class="step-label">${TAB_LABEL[state.tab]}</span>`;
}

/* ================= 렌더 ================= */
function render(){
  document.getElementById('stepsBar').innerHTML = renderSteps();
  const main = document.getElementById('main');
  const isOW = state.selectedGame === 'onewolf';
  const isNew = state.selectedGame === 'newmafia';
  const isLL = state.selectedGame === 'loveletter';
  const isDM = state.selectedGame === 'dalmuti';
  if(state.tab==='home') main.innerHTML = renderHome();
  else if(state.tab==='setup') main.innerHTML = isOW ? renderSetupOW() : isNew ? renderSetupNewMafia() : isLL ? renderSetupLL() : isDM ? renderSetupDM() : renderSetupMafia();
  else if(state.tab==='board') main.innerHTML = isOW ? renderBoardOW() : isNew ? renderBoardNewMafia() : isLL ? renderBoardLL() : isDM ? renderBoardDM() : renderBoardMafia();
  else if(state.tab==='play') main.innerHTML = isOW ? renderPlayOW() : isNew ? renderPlayNewMafia() : isLL ? renderPlayLL() : isDM ? renderPlayDM() : renderPlayMafia();
  bindEvents();
}

/* ---- 홈 ---- */
function renderHome(){
  const cards = GAMES.map(g=>{
    const disabled = g.status !== 'ready';
    const selected = !disabled && state.selectedGame === g.id;
    return `
    <div class="card game-card ${disabled?'disabled':''} ${selected?'selected':''}" data-game="${g.id}" ${disabled?'':'data-action="selectgame"'}>
      <h4>${g.name}</h4>
    </div>`;
  }).join('');

  const hasSelection = GAMES.some(g=>g.id===state.selectedGame && g.status==='ready');

  return `
    <div class="page-title">게임 목록</div>
    <div class="grid">${cards}</div>
    ${hasSelection ? `<button class="fab-next" data-action="gotoSetup">진행 →</button>` : ''}
  `;
}

/* ---- 인원 설정 ---- */
function ensureCustomSetup(){
  const n = nearestSetupCount(state.playerCount);
  if(!state.customSetup || state.customSetupCount !== n){
    state.customSetup = {...SETUPS[n]};
    state.customSetupCount = n;
  }
}

function renderSetupMafia(){
  const n = nearestSetupCount(state.playerCount);
  ensureCustomSetup();
  const total = Object.values(state.customSetup).reduce((a,b)=>a+b,0);
  const valid = total === n;

  const roleRows = Object.keys(ROLE_INFO).map(role=>{
    const info = ROLE_INFO[role];
    const count = state.customSetup[role] || 0;
    return `<div class="role-row">
      <div><span class="role-tag ${info.tag}">${role}</span> <span class="small-muted">${info.desc}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="secondary" style="padding:4px 12px;border-radius:8px;" data-action="decRole" data-role="${role}">−</button>
        <span style="font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;min-width:18px;text-align:center;">${count}</span>
        <button class="secondary" style="padding:4px 12px;border-radius:8px;" data-action="incRole" data-role="${role}">+</button>
      </div>
    </div>`;
  }).join('');

  const countButtons = Array.from({length:8}, (_,i)=>8+i).map(c=>{
    return `<div class="count-btn ${state.playerCount===c?'selected':''}" data-action="selectCount" data-count="${c}">${c}명</div>`;
  }).join('');

  return `
    <button class="secondary fab-back" data-action="back">← 뒤로</button>
    <div class="game-label">🎭 구 마피아</div>
    <div class="page-title">인원 설정</div>
    <div class="card">
      <label style="margin-top:0;">참여 인원 수</label>
      <div class="count-grid">${countButtons}</div>
    </div>
    <div class="card">
      <div class="flex-between">
        <h3 style="margin:0;">${n}명 역할 조합 (직접 조정 가능)</h3>
        <button class="secondary" data-action="resetComposition">기본값으로 초기화</button>
      </div>
      <div class="small-muted" style="margin:10px 0 4px;">현재 배정: <b style="color:${valid?'var(--special)':'var(--mafia)'};">${total}명 / ${n}명</b>${valid?'':' — 총 인원수와 정확히 맞아야 다음으로 진행할 수 있어요.'}</div>
      ${roleRows}
    </div>
    <button class="fab-next" data-action="gotoboard" ${valid?'':'disabled'}>다음 →</button>
  `;
}

/* ---- 딜러 보드 ---- */
function renderBoardMafia(){
  const n = nearestSetupCount(state.playerCount);
  ensureCustomSetup();
  const setup = state.customSetup;
  const totalNeeded = Object.values(setup).reduce((a,b)=>a+b,0);

  const nameFields = Array.from({length: totalNeeded}).map((_, i)=>{
    const existing = (state.players[i] && state.players[i].name) || state.nameDraft[i] || '';
    return `
    <div class="name-field">
      <span class="name-no">${String(i+1).padStart(2,'0')}</span>
      <input type="text" class="nameInput" data-idx="${i}" value="${existing}" placeholder="참가자 이름">
    </div>`;
  }).join('');

  const namesArea = (state.rolePick && state.rolePick.gameType==='mafia') ? renderRolePickUI() : `
    <div class="card">
      <h3>참가자 이름 입력 (${totalNeeded}명)</h3>
      <div class="name-grid">${nameFields}</div>
      <hr class="divider">
      <div style="text-align:right;">
        <button data-action="startRolePickMafia">역할 랜덤 배정</button>
      </div>
    </div>
  `;

  let cardsHtml = '';
  if(state.assigned && state.players.length){
    const rows = state.players.map((p,i)=>{
      const info = ROLE_INFO[p.role] || {tag:"citizen", desc:""};
      return `
      <div class="result-row ${!p.alive?'dead':''}">
        <div class="avatar">${String(i+1).padStart(2,'0')}</div>
        <div class="result-name">${p.name}</div>
        <div class="result-spacer"></div>
        <span class="role-tag ${info.tag}">${p.role}</span>
        ${!p.alive?'<span class="status-chip">OUT</span>':''}
      </div>`;
    }).join('');
    cardsHtml = `
      <div class="card">
        <h3 style="margin-bottom:6px;">배정 결과</h3>
        <div class="small-muted" style="margin-bottom:14px;">딜러 전용 화면입니다. 바로 확인할 수 있습니다.</div>
        <div class="result-list">${rows}</div>
        <hr class="divider">
        <div class="flex-between">
          <span class="small-muted">배정이 끝났다면 진행 화면으로 이동하세요.</span>
          <button data-action="startGame">게임 시작 →</button>
        </div>
      </div>
    `;
  }

  return `
    <button class="secondary fab-back" data-action="back">← 뒤로</button>
    <div class="game-label">🎭 구 마피아</div>
    <div class="page-title">딜러 보드</div>
    ${namesArea}
    ${cardsHtml}
  `;
}

/* ---- 진행 & 기록 ---- */
function alivePlayers(){ return state.players.filter(p=>p.alive); }
function getPlayer(id){ return state.players.find(p=>p.id===id); }

function getTeam(p){
  if(p.role === '스파이' && p.spyJoined) return 'mafia';
  return (ROLE_INFO[p.currentRole] || {team:"citizen"}).team;
}

function checkWinner(){
  const alive = alivePlayers();
  const mafiaAlive = alive.filter(p=>getTeam(p)==='mafia').length;
  const citizenAlive = alive.length - mafiaAlive;
  if(mafiaAlive === 0) return 'citizen';
  if(mafiaAlive >= citizenAlive) return 'mafia';
  return null;
}

function optionsFor(list, selectedVal){
  return `<option value="">— 선택 안 함 —</option>` + list.map(p=>`<option value="${p.id}" ${selectedVal===p.id?'selected':''}>${p.name} (${p.role})</option>`).join('');
}

  if(!state.gameStarted){

        ${hasRole('탐정') ? `<label>탐정의 지목 (스파이/기생으로 의심되는 대상)</label><select id="act_detective">${optionsFor(alive, state.night.detective)}</select>` : ''}
        ${hasRole('명탐정') ? `<label>명탐정의 확인 대상 (이번 밤 능력을 받았는지)</label><select id="act_mindreader">${optionsFor(alive, state.night.mindreader)}</select>` : ''}
        ${hasRole('무당') ? `<label>무당이 확인할 사망자</label><select id="act_shaman">${optionsFor(dead, state.night.shaman)}</select>` : ''}

        <div class="dot"></div>
        <div>
          <div class="ptitle">${state.day}일차 ${isNight?'밤':'낮'}</div>
          <div class="psub">생존자 ${alive.length}명 / 전체 ${state.players.length}명</div>
        </div>
      </div>
      ${renderRoster()}
    </div>
    <div class="card">
      <h3>기록</h3>
      ${renderLog()}
    </div>
    ${actionPanel}
  `;
}

/* ---- 원나잇 웨어울프: 인원 설정 ---- */
function renderSetupOW(){
  const n = nearestOwCount(state.playerCountOW || 5);
  ensureCustomSetupOW();
  const target = n + 3;
  const total = Object.values(state.customSetupOW).reduce((a,b)=>a+b,0);
  const valid = total === target;
  const masonCount = state.customSetupOW['비밀요원'] || 0;
  const masonOk = masonCount % 2 === 0;

  const roleRows = Object.keys(OW_ROLE_INFO).map(role=>{
    const info = OW_ROLE_INFO[role];
    const count = state.customSetupOW[role] || 0;
    return `<div class="role-row">
      <div><span class="role-tag ${info.tag}">${role}</span> <span class="small-muted">${info.desc}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="secondary" style="padding:4px 12px;border-radius:8px;" data-action="decRoleOW" data-role="${role}">−</button>
        <span style="font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;min-width:18px;text-align:center;">${count}</span>
        <button class="secondary" style="padding:4px 12px;border-radius:8px;" data-action="incRoleOW" data-role="${role}">+</button>
      </div>
    </div>`;
  }).join('');

  const countButtons = Array.from({length:8}, (_,i)=>3+i).map(c=>{
    return `<div class="count-btn ${(state.playerCountOW||5)===c?'selected':''}" data-action="selectCountOW" data-count="${c}">${c}명</div>`;
  }).join('');

  return `
    <button class="secondary fab-back" data-action="back">← 뒤로</button>
    <div class="game-label">🐺 원나잇 웨어울프</div>
    <div class="page-title">인원 설정</div>
    <div class="card">
      <label style="margin-top:0;">참여 인원 수</label>
      <div class="count-grid">${countButtons}</div>
    </div>
    <div class="card">
      <div class="flex-between">
        <h3 style="margin:0;">${n}명 카드 구성 (총 ${target}장 필요 = 인원 + 3)</h3>
        <button class="secondary" data-action="resetCompositionOW">기본값으로 초기화</button>
      </div>
      <div class="small-muted" style="margin:10px 0 4px;">
        현재 구성: <b style="color:${valid?'var(--special)':'var(--mafia)'};">${total}장 / ${target}장</b>${valid?'':' — 총 카드 수가 정확히 맞아야 다음으로 진행할 수 있어요.'}
        ${!masonOk ? ' · <b style="color:var(--mafia);">비밀요원은 항상 2명(짝수)이어야 합니다.</b>' : ''}
      </div>
      ${roleRows}
    </div>
    <button class="fab-next" data-action="gotoboard" ${(valid && masonOk)?'':'disabled'}>다음 →</button>
  `;
}

/* ---- 원나잇 웨어울프: 딜러 보드 ---- */
function renderBoardOW(){
  const n = nearestOwCount(state.playerCountOW || 5);

  const nameFields = Array.from({length:n}).map((_, i)=>{
    const existing = (state.players[i] && state.players[i].name) || (state.nameDraftOW && state.nameDraftOW[i]) || '';
    return `
    <div class="name-field">
      <span class="name-no">${String(i+1).padStart(2,'0')}</span>
      <input type="text" class="nameInput" data-idx="${i}" value="${existing}" placeholder="참가자 이름">
    </div>`;
  }).join('');

  const namesArea = (state.rolePick && state.rolePick.gameType==='ow') ? renderRolePickUI() : `
    <div class="card">
      <h3>참가자 이름 입력 (${n}명)</h3>
      <div class="name-grid">${nameFields}</div>
      <hr class="divider">
      <div style="text-align:right;">
        <button data-action="startRolePickOW">역할 랜덤 배정</button>
      </div>
    </div>
  `;

  let resultHtml = '';
  if(state.assigned && state.players.length && state.ow && state.ow.centerCards){
    const rows = state.players.map((p,i)=>{
      const info = OW_ROLE_INFO[p.role];
      return `
      <div class="result-row">
        <div class="avatar">${String(i+1).padStart(2,'0')}</div>
        <div class="result-name">${p.name}</div>
        <div class="result-spacer"></div>
        <span class="role-tag ${info.tag}">${p.role}</span>
      </div>`;
    }).join('');
    const centerChips = state.ow.centerCards.map((r,i)=>`<span class="role-tag ${OW_ROLE_INFO[r].tag}" style="margin-right:8px;">센터${i+1}: ${r}</span>`).join('');
    resultHtml = `
      <div class="card">
        <h3 style="margin-bottom:6px;">배정 결과</h3>
        <div class="small-muted" style="margin-bottom:14px;">딜러 전용 화면입니다. 바로 확인할 수 있습니다.</div>
        <div class="result-list">${rows}</div>
        <hr class="divider">
        <div>${centerChips}</div>
        <hr class="divider">
        <div class="flex-between">
          <span class="small-muted">배정이 끝났다면 진행 화면으로 이동하세요.</span>

    `;
  }

  return `
    <button class="secondary fab-back" data-action="back">← 뒤로</button>
    <div class="game-label">🐺 원나잇 웨어울프</div>
    <div class="page-title">딜러 보드</div>
    ${namesArea}
    ${resultHtml}
  `;
}

/* ---- 원나잇 웨어울프: 진행 ---- */
function owCenterOptions(selectedIdx){
  return [0,1,2].map(i=>`<option value="${i}" ${selectedIdx===i?'selected':''}>센터 카드 ${i+1}</option>`).join('');
}
function owPlayerOptions(excludeId){
  return state.players.filter(p=>p.id!==excludeId).map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
}

function renderOwStepForm(role){
  if(state.ow.stepResolved){
    return `
      <div class="card">
        <h3>${role} 차례 — 결과</h3>
        <div class="rule-text" style="margin-bottom:14px;">${state.ow.lastResult}</div>
        <button data-action="owNextStep">다음 능력 →</button>
      </div>
    `;
  }

  if(role === '늑대인간'){
    const wolves = state.players.filter(p=>p.role==='늑대인간');
    if(wolves.length>=2){
      state.ow.lastResult = `늑대인간들이 서로를 확인했습니다: <b>${wolves.map(w=>w.name).join(', ')}</b>`;
      state.ow.stepResolved = true;
      return renderOwStepForm(role);
    }
    if(wolves.length===1){
      return `
      <div class="card">
        <h3>늑대인간 차례 — ${wolves[0].name}</h3>
        <div class="small-muted" style="margin-bottom:10px;">혼자인 늑대인간이 확인할 센터 카드를 선택하세요.</div>
        <label>센터 카드 선택</label>
        <select id="owCenterSelect">${owCenterOptions(null)}</select>
        <hr class="divider">
        <button data-action="owWolfPeek">확인하기 →</button>
      </div>`;
    }
    state.ow.lastResult = '이 덱에는 늑대인간이 없습니다.';
    state.ow.stepResolved = true;
    return renderOwStepForm(role);
  }

  if(role === '하수인'){
    const minion = state.players.find(p=>p.role==='하수인');
    const wolvesNow = state.players.filter(p=>p.currentRole==='늑대인간');
    const wolfNames = wolvesNow.length ? wolvesNow.map(w=>w.name).join(', ') : '없음';
    state.ow.lastResult = `${minion.name}에게 알려주세요 — 늑대인간은 <b>${wolfNames}</b>입니다.`;
    state.ow.stepResolved = true;
    return renderOwStepForm(role);
  }

  if(role === '비밀요원'){
    const masons = state.players.filter(p=>p.role==='비밀요원');
    if(masons.length>=2){
      state.ow.lastResult = `비밀요원들이 서로를 확인했습니다: <b>${masons.map(m=>m.name).join(', ')}</b>`;
    } else {
      const centerMasonCount = state.ow.centerCards.filter(r=>r==='비밀요원').length;
      state.ow.lastResult = centerMasonCount>=1
        ? `${masons[0].name}에게 알려주세요 — 센터 카드 중 1장이 비밀요원입니다.`
        : `${masons[0].name}에게 알려주세요 — 추가 정보가 없습니다. (다른 비밀요원 카드 없음)`;
    }
    state.ow.stepResolved = true;
    return renderOwStepForm(role);
  }

  if(role === '천리안'){
    const seer = state.players.find(p=>p.role==='천리안');
    const mode = state.ow.seerMode;
    let body = `
      <div class="small-muted" style="margin-bottom:10px;">${seer.name}이(가) 확인할 방법을 선택하세요.</div>
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <button class="${mode==='center'?'':'secondary'}" data-action="owSeerMode" data-mode="center">센터 카드 2장 보기</button>
        <button class="${mode==='player'?'':'secondary'}" data-action="owSeerMode" data-mode="player">플레이어 카드 보기</button>
      </div>
    `;
    if(mode==='center'){
      body += `
        <label>첫 번째 센터 카드</label><select id="owSeerC1">${owCenterOptions(0)}</select>
        <label>두 번째 센터 카드</label><select id="owSeerC2">${owCenterOptions(1)}</select>
        <hr class="divider">
        <button data-action="owSeerCenterConfirm">확인하기 →</button>
      `;
    } else if(mode==='player'){
      body += `
        <label>확인할 플레이어</label><select id="owSeerTarget">${owPlayerOptions(seer.id)}</select>
        <hr class="divider">
        <button data-action="owSeerPlayerConfirm">확인하기 →</button>
      `;
    }
    return `<div class="card"><h3>천리안 차례 — ${seer.name}</h3>${body}</div>`;
  }

  if(role === '강도'){
    const robber = state.players.find(p=>p.role==='강도');
    return `
      <div class="card">
        <h3>강도 차례 — ${robber.name}</h3>
        <label>카드를 바꿀 상대</label>
        <select id="owRobberTarget">${owPlayerOptions(robber.id)}</select>
        <hr class="divider">
        <button data-action="owRobberConfirm">교환하기 →</button>
      </div>`;
  }

  if(role === '문제아'){
    const tm = state.players.find(p=>p.role==='문제아');
    return `
      <div class="card">
        <h3>문제아 차례 — ${tm.name}</h3>
        <div class="small-muted" style="margin-bottom:10px;">카드를 바꿀 다른 두 명을 선택하거나, 활동을 포기하세요.</div>
        <label>첫 번째 플레이어</label><select id="owTrouble1">${owPlayerOptions(tm.id)}</select>
        <label>두 번째 플레이어</label><select id="owTrouble2">${owPlayerOptions(tm.id)}</select>
        <hr class="divider">
        <div class="flex-between">
          <button class="secondary" data-action="owTroubleSkip">활동 포기</button>
          <button data-action="owTroubleConfirm">맞바꾸기 →</button>
        </div>
      </div>`;
  }

  if(role === '주정뱅이'){
    const drunk = state.players.find(p=>p.role==='주정뱅이');
    return `
      <div class="card">
        <h3>주정뱅이 차례 — ${drunk.name}</h3>
        <div class="small-muted" style="margin-bottom:10px;">센터 카드 1장과 반드시 교환합니다. (본인도 결과를 모릅니다)</div>
        <label>센터 카드 선택</label>
        <select id="owDrunkCenter">${owCenterOptions(null)}</select>
        <hr class="divider">
        <button data-action="owDrunkConfirm">교환하기 →</button>
      </div>`;
  }

  if(role === '불면증'){
    const insomniac = state.players.find(p=>p.role==='불면증');
    state.ow.lastResult = `${insomniac.name}에게 알려주세요 — 현재 카드는 <b>${insomniac.currentRole}</b>입니다.`;
    state.ow.stepResolved = true;
    return renderOwStepForm(role);
  }

  return '';
}

function renderOwTransferList(){
  const transfers = (state.ow && state.ow.transfers) || [];
  if(!transfers.length) return '';
  const items = transfers.map(t=>`<span class="roster-chip"><b>${t.role}</b>: ${t.from} → ${t.to}</span>`).join('');
  return `<div class="small-muted" style="margin-top:10px;width:100%;">이번 밤 카드 이동</div><div class="roster-bar" style="margin-top:6px;">${items}</div>`;
}

function renderOwRoster(){
  const chips = state.players.map(p=>`<div class="roster-chip ${!p.alive?'dead':''}"><b>${p.currentRole}</b> ${p.name}</div>`).join('');
  return `<div class="roster-bar">${chips}</div>${renderOwTransferList()}`;
}

function renderOwRoleReveal(){
  const rows = state.players.map(p=>{
    const changed = p.role !== p.currentRole;
    const info = OW_ROLE_INFO[p.currentRole];
    return `<div class="role-row"><span>${p.name} ${!p.alive?'<span class="small-muted">(사망)</span>':''}</span><span class="role-tag ${info.tag}">${p.role}${changed?` → ${p.currentRole}`:''}</span></div>`;
  }).join('');
  const centerRow = `<div class="role-row"><span class="small-muted">센터 카드</span><span style="font-family:'Spoqa Han Sans Neo', sans-serif;">${state.ow.centerCards.join(', ')}</span></div>`;
  const transfers = (state.ow && state.ow.transfers) || [];
  const transferRows = transfers.length
    ? transfers.map(t=>`<div class="role-row"><span class="small-muted">${t.role}</span><span>${t.from} → ${t.to}</span></div>`).join('')
    : `<div class="role-row"><span class="small-muted">이번 밤에는 카드가 바뀌지 않았습니다.</span></div>`;
  return `<div class="card"><h3>전체 정체 공개 (최초 역할 → 최종 역할)</h3>${rows}${centerRow}</div>
    <div class="card"><h3>카드 이동 내역</h3>${transferRows}</div>`;
}

function renderPlayOW(){
  if(!state.gameStarted){
    return `
      <button class="secondary fab-back" data-action="back">← 뒤로</button>
      <div class="game-label">🐺 원나잇 웨어울프</div>
      <div class="page-title">진행 &amp; 기록</div>
      <div class="page-sub">아직 게임이 시작되지 않았습니다.</div>
      <div class="card">딜러 보드에서 참가자 역할을 배정하고 <b>게임 시작</b>을 눌러주세요.</div>
    `;
  }

  const ow = state.ow;

  if(ow.winners){
    const teamNames = {village:'마을 팀', werewolf:'늑대인간 팀', tanner:'무두장이'};
    const label = ow.winners.length ? ow.winners.map(w=>teamNames[w]).join(' + ') + ' 승리' : '승자 없음 (조건 불충족)';
    const isWolf = ow.winners.includes('werewolf');
    return `
      <div class="game-label">🐺 원나잇 웨어울프</div>
      <div class="page-title">진행 &amp; 기록</div>
      <div class="winner-banner ${isWolf?'':'citizen'}">
        <h2>${label}</h2>
        <p>하룻밤과 한 번의 투표가 끝났습니다.</p>
      </div>
      ${renderOwRoleReveal()}
      ${renderRecordExportBlock('원나잇 웨어울프', buildOwRanking())}
      <div class="card">${renderLog(ow.log)}</div>
      <button class="secondary" data-action="resetGame">새 게임 시작</button>
    `;
  }

  if(ow.phase === 'night'){
    const role = ow.activeSteps[ow.stepIndex];
    return `
      <div class="game-label">🐺 원나잇 웨어울프</div>
      <div class="page-title">진행 &amp; 기록</div>
      <div class="phase-banner night">
        <div class="phase-top">
          <div class="dot"></div>
          <div>
            <div class="ptitle">밤 — ${role} 차례 (${ow.stepIndex+1}/${ow.activeSteps.length})</div>
            <div class="psub">전체 ${state.players.length}명 · 센터 카드 3장</div>
          </div>
        </div>
        ${renderOwRoster()}
      </div>
      <div class="card">
        <h3>기록</h3>
        ${renderLog(ow.log)}
      </div>
      ${renderOwStepForm(role)}
    `;
  }

  // 낮 (투표)
  const hunterInvolved = ow.pendingExecution && getPlayer(ow.pendingExecution)?.currentRole === '사냥꾼';
  const chips = state.players.map(p=>{
    const sel = ow.pendingExecution === p.id;
    return `<div class="vote-btn ${sel?'selected':''}" data-action="owSelectExecution" data-pid="${p.id}">${p.name}</div>`;
  }).join('');

  return `
    <div class="game-label">🐺 원나잇 웨어울프</div>
    <div class="page-title">진행 &amp; 기록</div>
    <div class="phase-banner">
      <div class="phase-top">
        <div class="dot"></div>
        <div>
          <div class="ptitle">낮 — 투표</div>
          <div class="psub">전체 ${state.players.length}명</div>
        </div>
      </div>
      ${renderOwRoster()}
    </div>
    <div class="card">
      <h3>기록</h3>
      ${renderLog(ow.log)}
    </div>
    <div class="card">
      <h3>최다 득표자 선택</h3>
      <div class="small-muted">토론과 투표는 오프라인에서 진행하고, 최다 득표자를 선택하세요. 동점이면 아무도 처형하지 않아도 됩니다.</div>
      <div class="vote-list" style="margin-top:12px;">${chips}</div>
      ${hunterInvolved ? `
        <label>사냥꾼(${getPlayer(ow.pendingExecution).name})이 투표한 대상</label>
        <select id="owHunterTarget">${owPlayerOptions(ow.pendingExecution)}</select>
      ` : ''}
      <hr class="divider">
      <div class="flex-between">
        <button class="secondary" data-action="owNoExecution">아무도 처형하지 않음</button>
        <button data-action="owConfirmExecution" ${ow.pendingExecution?'':'disabled'}>처형하고 결과 보기 →</button>
      </div>
    </div>
  `;
}

/* ==================== 신 마피아 ==================== */
function ensureCustomSetupNew(){
  const n = nearestNewMafiaCount(state.playerCountNew);
  if(!state.customSetupNew || state.customSetupNewCount !== n){
    state.customSetupNew = {...NEWMAFIA_SETUPS[n]};
    state.customSetupNewCount = n;
  }
}

function renderSetupNewMafia(){
  const n = nearestNewMafiaCount(state.playerCountNew);
  ensureCustomSetupNew();
  const total = Object.values(state.customSetupNew).reduce((a,b)=>a+b,0);
  const valid = total === n;

  const roleRows = Object.keys(NEWMAFIA_ROLE_INFO).map(role=>{
    const info = NEWMAFIA_ROLE_INFO[role];
    const count = state.customSetupNew[role] || 0;
    return `<div class="role-row">
      <div><span class="role-tag ${info.tag}">${role}</span> <span class="small-muted">${info.desc}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="secondary" style="padding:4px 12px;border-radius:8px;" data-action="decRoleNew" data-role="${role}">−</button>
        <span style="font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;min-width:18px;text-align:center;">${count}</span>
        <button class="secondary" style="padding:4px 12px;border-radius:8px;" data-action="incRoleNew" data-role="${role}">+</button>
      </div>
    </div>`;
  }).join('');

  const countButtons = Array.from({length:10}, (_,i)=>6+i).map(c=>{
    return `<div class="count-btn ${state.playerCountNew===c?'selected':''}" data-action="selectCountNew" data-count="${c}">${c}명</div>`;
  }).join('');

  return `
    <button class="secondary fab-back" data-action="back">← 뒤로</button>
    <div class="game-label">🔫 신 마피아</div>
    <div class="page-title">인원 설정</div>
    <div class="card">
      <label style="margin-top:0;">참여 인원 수</label>
      <div class="count-grid">${countButtons}</div>
    </div>
    <div class="card">

        ${soldier && state.day>=2 ? `<label>군인(${soldier.name})의 1회용 습격 대상</label><select id="act2_soldier">${optionsForNew(alive.filter(p=>p.id!==soldier.id), state.night2.soldier)}</select>` : ''}

        ${hasRole('의사') ? `<label>의사의 치료 대상 (자힐 가능)</label><select id="act2_doctor">${optionsForNew(alive, state.night2.doctor)}</select>` : ''}
        ${hasRole('경찰') ? `<label>경찰의 조사 대상</label><select id="act2_police">${optionsForNew(alive, state.night2.police)}</select>` : ''}

        ${hasRole('스토커') ? `<label>스토커가 감시할 대상</label><select id="act2_stalker">${optionsForNew(alive, state.night2.stalker)}</select>` : ''}

  return `
    <div class="game-label">🔫 신 마피아</div>
    <div class="flex-between">
      <div class="page-title" style="margin-bottom:0;">진행 &amp; 기록</div>

  return state.players.filter(p=>!state.ll.eliminated[p.id]);

  return state.players[state.ll.turnIndex];
}
function llCountAlive(){ return llAlivePlayers().length; }

function renderLLTokenBar(){
  const chips = state.players.map(p=>{
    const t = (state.ll.tokens[p.id]) || 0;
    const out = state.ll.eliminated[p.id];
    const card = state.ll.hand ? state.ll.hand[p.id] : null;

    return `<div class="roster-chip ${out?'dead':''}"><b>💛${t}</b> ${p.name}${cardLabel}${state.ll.protected[p.id]?' 🛡':''}</div>`;

  return `<div class="roster-bar">${chips}</div>`;
}

          <button class="secondary" data-action="llCopyBacks">복사하기</button>
        </div>
        <div class="small-muted" style="margin:8px 0;">카드 이름 없이 번호만 나열됩니다. 이 목록을 복사해서 플레이어들에게 공유하세요.</div>
        <div class="backs-box" id="llBacksText">${backsText || '(없음)'}</div>
      </div>
      <div class="card">
        <h3>카드별 효과 설명</h3>
        <div class="small-muted" style="margin-bottom:10px;">현재 버전(${ll.version==='2019'?'2019':'기존'})에 포함된 카드 기준입니다.</div>
        ${guideRows}
      </div>
    `;
  } else if(ll.phase === 'choose'){
    actionPanel = `
      <div class="card">
        <h3>${cur.name} — 낼 카드를 선택하세요</h3>
        <div class="small-muted" style="margin-bottom:10px;">두 카드 중 하나를 반드시 냅니다.</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button data-action="llChoose" data-card="${ll.hand[cur.id]}" data-slot="hand">${ll.hand[cur.id]} (원래 카드)</button>
          <button data-action="llChoose" data-card="${ll.drawnCard}" data-slot="drawn">${ll.drawnCard} (새로 뽑은 카드)</button>
        </div>
      </div>
    `;
  } else if(ll.phase === 'target'){
    const card = ll.pendingCard;
    const targets = llAlivePlayers().filter(p=> p.id !== cur.id ? !ll.protected[p.id] : (card==='마법사'));
    const cardNameOptions = Object.keys(LL_CARD_INFO).filter(n=>n!=='병사').map(n=>`<option value="${n}">${n}</option>`).join('');
    actionPanel = `
      <div class="card">
        <h3>${cur.name}이(가) ${card}을(를) 냈습니다</h3>
        <label>지목할 대상</label>
        <select id="ll_target">${llCardOptionsFor(targets)}</select>
        ${card==='병사' ? `<label>맞힐 카드 이름</label><select id="ll_guess">${cardNameOptions}</select>` : ''}
        <hr class="divider">
        <button data-action="llConfirmTarget">확인 →</button>
      </div>
    `;
  } else if(ll.phase === 'minister'){
    const [a,b] = ll.ministerDraw;
    actionPanel = `
      <div class="card">
        <h3>${cur.name} — 수상: 가질 카드를 선택하세요</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button data-action="llMinisterKeep" data-card="${a}" data-idx="0">${a}</button>
          <button data-action="llMinisterKeep" data-card="${b}" data-idx="1">${b}</button>
        </div>
      </div>
    `;
  }

  return `
    <div class="game-label">💌 러브 레터</div>
    <div class="flex-between">
      <div class="page-title" style="margin-bottom:0;">진행 &amp; 기록</div>
      <button class="secondary" data-action="undoStep" ${state.history.length?'':'disabled'}>↺ 되돌리기</button>
    </div>
    <div class="page-sub">&nbsp;</div>
    <div class="phase-banner">
      <div class="phase-top"><div class="dot"></div><div><div class="ptitle">${ll.roundNumber}라운드 · 뽑을 수 있는 카드 ${llCountUntaken()}장 남음</div><div class="psub">생존 ${llCountAlive()}명 / 전체 ${state.players.length}명</div></div></div>
      ${renderLLTokenBar()}
    </div>
    <div class="card">
      <h3>기록</h3>
      ${renderLog(ll.log)}
    </div>
    ${actionPanel}
  `;
}

/* ==================== 달무티 ==================== */
function renderSetupDM(){
  const countButtons = [4,5,6,7,8].map(c=>{
    return `<div class="count-btn ${state.playerCountDM===c?'selected':''}" data-action="selectCountDM" data-count="${c}">${c}명</div>`;
  }).join('');

  const cardRows = Object.entries(DM_TITLES).map(([val,title])=>`
    <div class="role-row">
      <div><span class="role-tag special">${val} · ${title}</span></div>
      <div style="font-family:'Spoqa Han Sans Neo', sans-serif;font-weight:700;">${DM_COUNTS[val]}장</div>
    </div>
  `).join('');

  return `
    <button class="secondary fab-back" data-action="back">← 뒤로</button>
    <div class="game-label">👑 달무티</div>
    <div class="page-title">인원 설정</div>
    <div class="card">
      <label style="margin-top:0;">참여 인원 수</label>
      <div class="count-grid">${countButtons}</div>
    </div>
    <div class="card">
      <h3>카드 구성 (숫자가 낮을수록 계급이 높음)</h3>
      <div class="small-muted" style="margin-bottom:10px;">어릿광대(13)는 다른 카드와 함께 낼 때 원하는 숫자로 대신 사용할 수 있습니다.</div>
      ${cardRows}
    </div>
    <button class="fab-next" data-action="gotoboard">다음 →</button>
  `;
}

function renderBoardDM(){
  const n = state.playerCountDM;
  const nameFields = Array.from({length:n}).map((_, i)=>{
    const existing = (state.players[i] && state.players[i].name) || state.nameDraftDM[i] || '';
    return `
    <div class="name-field">
      <span class="name-no">${String(i+1).padStart(2,'0')}</span>
      <input type="text" class="nameInputDM" data-idx="${i}" value="${existing}" placeholder="참가자 이름">
    </div>`;
  }).join('');

  return `
    <button class="secondary fab-back" data-action="back">← 뒤로</button>
    <div class="game-label">👑 달무티</div>
    <div class="page-title">딜러 보드</div>
    <div class="card">
      <h3>참가자 이름 입력 (${n}명)</h3>
      <div class="name-grid">${nameFields}</div>
      <hr class="divider">
      <div style="text-align:right;">
        <button data-action="startGame">게임 시작 →</button>
      </div>
    </div>
  `;
}

function dmRosterBar(){
  const dm = state.dm;
  const chips = state.players.map((p,i)=>{
    const label = dm.ranks[p.id] || '상인';
    const finished = dm.finishOrder.includes(i);
    return `<div class="roster-chip ${finished?'dead':''}"><b>${label}</b> ${p.name}</div>`;
  }).join('');
  return `<div class="roster-bar">${chips}</div>`;
}

// 구 마피아 / 신 마피아 / 원나잇 웨어울프 공용: 참가자가 직접 번호를 골라 역할을 배정받는 화면
function renderRolePickUI(){
  const rp = state.rolePick;
  const options = rp.layout.map(slot=>`<option value="${slot.num}">${slot.num}번</option>`).join('');
  const rows = rp.names.map((name,i)=>`
    <div class="role-row">
      <span>${name}</span>
      <select class="rolePickSelect" data-idx="${i}" style="width:auto;min-width:120px;">
        <option value="">— 선택 —</option>
        ${options}
      </select>
    </div>
  `).join('');
  return `
    <div class="card">
      <h3>번호를 뽑아 역할을 확인하세요</h3>
      <div class="small-muted" style="margin-bottom:10px;">각자 원하는 번호를 골라주세요. 서로 다른 번호를 선택해야 합니다. 선택 완료를 누르면 그 번호에 배정된 역할로 확정됩니다.</div>
      ${rows}
      <hr class="divider">
      <button data-action="confirmRolePick">선택 완료 →</button>
    </div>
  `;
}

function dmHandsPanel(){
  const dm = state.dm;
  const rows = state.players.map(p=>{
    const hand = dm.hands[p.id] || [];
    const finished = dm.finishOrder.includes(state.players.indexOf(p));
    const handText = hand.length ? hand.join(', ') : '(없음)';
    const copyText = `${p.name}: ${handText}`;
    return `<div class="role-row">
      <span>${p.name}${finished?' <span class="small-muted">(완료)</span>':''}</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span style="font-family:'JetBrains Mono',monospace;">${handText} <span class="small-muted">(${hand.length}장)</span></span>
        <button class="secondary" style="padding:4px 10px;font-size:11px;" data-action="dmCopyPlayerHand" data-text="${copyText.replace(/"/g,'&quot;')}">복사</button>
      </span>
    </div>`;
  }).join('');
  return `
    <div class="card">
      <h3 style="margin:0 0 8px;">플레이어 보유 카드 (실시간)</h3>
      <div class="small-muted" style="margin-bottom:8px;">카드를 낼 때마다 자동으로 갱신됩니다. 각자 자기 카드만 따로 복사할 수 있어요.</div>
      ${rows}
    </div>
  `;
}

function renderPlayDM(){
  if(!state.gameStarted){
    return `
      <button class="secondary fab-back" data-action="back">← 뒤로</button>
      <div class="game-label">👑 달무티</div>
      <div class="page-title">진행 &amp; 기록</div>
      <div class="page-sub">아직 게임이 시작되지 않았습니다.</div>
      <div class="card">딜러 보드에서 이름을 입력하고 <b>게임 시작</b>을 눌러주세요.</div>
    `;
  }

  const dm = state.dm;

  if(dm.phase === 'gameEnd'){
    const rows = dm.order.map((idx,pos)=>{
      const p = state.players[idx];
      return `<div class="role-row"><span>${p.name}</span><span class="role-tag special">${dmRankLabel(pos, dm.order.length)}</span></div>`;
    }).join('');
    return `
      <div class="game-label">👑 달무티</div>
      <div class="page-title">진행 &amp; 기록</div>
      <div class="winner-banner"><h2>게임 종료</h2><p>최종 계급을 확인하세요.</p></div>
      <div class="card"><h3>최종 계급</h3>${rows}</div>
      ${renderRecordExportBlock('달무티', buildDMRanking())}
      <div class="card">${renderLog(dm.log)}</div>
      <button class="secondary" data-action="resetGame">새 게임 시작</button>
    `;
  }

  let actionPanel = '';
  let handsPanel = '';

  if(dm.phase === 'drawPick'){
    const options = dm.drawLayout.map(c=>`<option value="${c.num}">${c.num}번</option>`).join('');
    const rows = state.players.map((p,i)=>`
      <div class="role-row">
        <span>${p.name}</span>
        <select class="dmDrawSelect" data-idx="${i}" style="width:auto;min-width:140px;">
          <option value="">— 선택 —</option>
          ${options}
        </select>
      </div>
    `).join('');
    actionPanel = `
      <div class="card">
        <div class="flex-between">
          <h3 style="margin:0;">순서 뽑기 (전원 한 화면에서 선택)</h3>
          <button class="secondary" data-action="dmBatchDraw">전체 무작위 뽑기 →</button>
        </div>
        <div class="small-muted" style="margin:10px 0;">각자 원하는 번호를 골라주세요. 서로 다른 번호를 선택해야 합니다. 가장 낮은 값을 받은 사람이 달무티(선), 가장 높은 값을 받은 사람이 농노가 됩니다.</div>
        ${rows}
        <hr class="divider">
        <button data-action="dmConfirmAllDraws">선택 완료 →</button>
      </div>
    `;
  } else if(dm.phase === 'dealing'){
    const rows = dm.order.map((idx,pos)=>{
      const p = state.players[idx];
      const label = dmRankLabel(pos, dm.order.length);
      const hand = dm.hands[p.id] || [];
      return `<div class="role-row"><span><b>${pos+1}번</b> ${p.name} <span class="small-muted">(${label})</span></span><span style="font-family:'JetBrains Mono',monospace;font-weight:700;">${hand.length}장</span></div>`;
    }).join('');
    actionPanel = `
      <div class="card">
        <h3>${dm.roundNumber}라운드 — 카드가 분배되었습니다</h3>
        <div class="small-muted" style="margin-bottom:10px;">실제 카드를 아래 매수·구성대로 나눠주세요. (남는 카드는 순위 높은 사람부터 1장씩)</div>
        ${rows}
        <hr class="divider">
        <button data-action="dmStartPlaying">다 나눠줬어요 — 진행 시작 →</button>
      </div>
    `;
    handsPanel = dmHandsPanel();
  } else if(dm.phase === 'playing'){
    const curIdx = dm.turnPlayerIdx;
    const cur = state.players[curIdx];
    const hand = dm.hands[cur.id];
    const addableIdx = dmAddableIndices(hand);
    const cardButtons = hand.map((val,i)=>{
      const sel = dm.selected.includes(i);
      const addable = addableIdx.includes(i);
      const isFollower = !!dm.currentPlay;
      const showPlayable = isFollower && !sel && addable;
      const disabled = isFollower && !sel && !addable;
      return `
      <div class="num-btn ${sel?'selected':''} ${showPlayable?'dm-playable':''} ${disabled?'dm-disabled':''}"
           ${disabled ? '' : `data-action="dmToggleCard" data-idx="${i}"`}
           style="${sel?'border-color:var(--accent);background:var(--accent-dim);':''}">
        <div class="num">${val}</div>
        <div class="cardname">${DM_TITLES[val]}</div>
      </div>
    `;}).join('');
    const selCards = dm.selected.map(i=>hand[i]);
    const requireText = dm.currentPlay
      ? `이전에 낸 카드: <b>${dm.currentPlay.value}</b> × ${dm.currentPlay.count}장 → 이번엔 반드시 <b>${dm.currentPlay.count}장</b>, <b>${dm.currentPlay.value}보다 낮은 숫자</b>를 내야 합니다. <span style="color:var(--special);">초록 테두리</span>가 낼 수 있는 카드이고, 흐린 카드는 낼 수 없습니다.`
      : '이번 트릭의 선입니다. 원하는 숫자와 장수를 자유롭게 선택하세요.';
    actionPanel = `
      <div class="card">
        <h3>${cur.name}의 차례</h3>
        <div class="small-muted" style="margin-bottom:10px;">${requireText}</div>
        <div class="num-grid">${cardButtons || '<span class="small-muted">보유 카드가 없습니다.</span>'}</div>
        <hr class="divider">
        <div class="small-muted" style="margin-bottom:10px;">선택된 카드: ${selCards.length ? selCards.join(', ') : '(없음)'}</div>
        <div class="flex-between">
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="secondary" data-action="dmClearSelection">선택 초기화</button>
            ${dm.currentPlay ? `<button class="secondary" data-action="dmPass">패스</button>` : ''}
          </div>
          <button data-action="dmPlayCards">선택한 카드 내기 →</button>
        </div>
      </div>
    `;
    handsPanel = dmHandsPanel();
  } else if(dm.phase === 'handEnd'){
    const total = dm.finishOrder.length;
    const rows = dm.finishOrder.map((idx,pos)=>`<div class="role-row"><span><b>${pos+1}등</b> ${state.players[idx].name}</span></div>`).join('');
    actionPanel = `
      <div class="card">
        <h3>${dm.roundNumber}라운드 종료</h3>
        <div class="small-muted" style="margin-bottom:10px;">등수가 다음 라운드 계급(달무티·대주교·광부·농노)으로 반영됩니다.</div>
        ${rows}
        <hr class="divider">
        <div class="flex-between">
          <button class="secondary" data-action="dmEndGame">게임 종료</button>
          <button data-action="dmDealNextRound">다음 라운드 카드 분배 →</button>
        </div>
      </div>
    `;
  } else if(dm.phase === 'taxCheck'){
    const total = dm.order.length;
    const newDalmuti = state.players[dm.order[0]];
    const newArch = total>1 ? state.players[dm.order[1]] : null;
    const newMiner = total>3 ? state.players[dm.order[total-2]] : null;
    const newPeasant = state.players[dm.order[total-1]];

    if(!dm.taxPhase){
      actionPanel = `
        <div class="card">
          <h3>${dm.roundNumber}라운드 — 카드 확인 및 혁명 체크</h3>
          <div class="small-muted" style="margin-bottom:10px;">카드가 분배됐습니다. 아래에서 각자 손패를 확인해 혁명 조건(어릿광대 2장)을 체크하세요.</div>
          <div class="role-row"><span>농노 <b>${newPeasant.name}</b> → 달무티 <b>${newDalmuti.name}</b></span><span class="small-muted">2장씩 서로 교환 · 다음 화면에서 카드 직접 선택</span></div>
          ${newMiner && newArch ? `<div class="role-row"><span>광부 <b>${newMiner.name}</b> → 대주교 <b>${newArch.name}</b></span><span class="small-muted">1장씩 서로 교환 · 다음 화면에서 카드 직접 선택</span></div>` : ''}
          <hr class="divider">
          <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="dm_revolution" style="width:auto;"> 혁명 발생 (분배 직후 어릿광대 2장이 농노가 아닌 사람 손에 있음 — 이번 세금 면제)</label>
          <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="dm_great_revolution" style="width:auto;"> 대혁명 발생 (분배 직후 어릿광대 2장이 농노 손에 있음 — 계급 전체 반전, 카드는 그대로)</label>
          <hr class="divider">
          <div class="flex-between">
            <button class="secondary" data-action="dmEndGame">게임 종료</button>
            <button data-action="dmTaxBegin">세금 낼 카드 선택하러 가기 →</button>
          </div>
        </div>
      `;
    } else {
      const taxInfo = {
        peasantGive: {giverIdx: dm.order[total-1], needCount:2, label:'농노가 상납할 카드 2장을 선택하세요', verb:'상납'},
        dalmutiGive: {giverIdx: dm.order[0], needCount:2, label:'달무티가 하사할 카드 2장을 선택하세요', verb:'하사'},
        minerGive:   {giverIdx: dm.order[total-2], needCount:1, label:'광부가 상납할 카드 1장을 선택하세요', verb:'상납'},
        archGive:    {giverIdx: dm.order[1], needCount:1, label:'대주교가 하사할 카드 1장을 선택하세요', verb:'하사'},
      }[dm.taxPhase];
      const giver = state.players[taxInfo.giverIdx];
      const hand = dm.hands[giver.id];
      const cardButtons = hand.map((val,i)=>{
        const sel = dm.selected.includes(i);
        return `<div class="num-btn ${sel?'selected':''}" data-action="dmTaxSelectCard" data-idx="${i}" style="${sel?'border-color:var(--accent);background:var(--accent-dim);':''}">
          <div class="num">${val}</div>
          <div class="cardname">${DM_TITLES[val]}</div>
        </div>`;
      }).join('');
      const selectedVals = dm.selected.map(i=>hand[i]);
      const summaryText = (dm.taxSummary||[]).length
        ? `<div class="small-muted" style="margin-bottom:10px;font-family:'JetBrains Mono',monospace;">${(dm.taxSummary||[]).join('<br>')}</div><hr class="divider">`
        : '';
      actionPanel = `
        <div class="card">
          <h3>${giver.name} — ${taxInfo.label}</h3>
          ${summaryText}
          <div class="small-muted" style="margin-bottom:10px;">${dm.selected.length} / ${taxInfo.needCount}장 선택됨</div>
          <div class="num-grid">${cardButtons}</div>
          <hr class="divider">
          <div class="small-muted" style="margin-bottom:10px;font-family:'JetBrains Mono',monospace;">${taxInfo.verb} → 카드 ${selectedVals.length ? selectedVals.join(', ') : '(선택 안 함)'}</div>
          <button data-action="dmTaxConfirmStep" ${dm.selected.length===taxInfo.needCount?'':'disabled'}>선택 확정 →</button>
        </div>
      `;
    }
    handsPanel = dmHandsPanel();
  }

  return `
    <div class="game-label">👑 달무티</div>
    <div class="flex-between">
      <div class="page-title" style="margin-bottom:0;">진행 &amp; 기록</div>
      <button class="secondary" data-action="dmEndGame">게임 종료</button>
    </div>
    <div class="page-sub">&nbsp;</div>
    <div class="phase-banner">
      <div class="phase-top"><div class="dot"></div><div><div class="ptitle">${dm.roundNumber}라운드</div><div class="psub">전체 ${state.players.length}명</div></div></div>
      ${dmRosterBar()}

function renderRoster(){
  const roleCounts = {};
  state.players.forEach(p=>{ roleCounts[p.currentRole] = (roleCounts[p.currentRole]||0)+1; });
  const seen = {};
  const chips = state.players.map(p=>{
    let label = p.currentRole;
    if(roleCounts[p.currentRole] > 1){
      seen[p.currentRole] = (seen[p.currentRole]||0)+1;
      label = `${p.currentRole}${seen[p.currentRole]}`;
    }
    return `<div class="roster-chip ${!p.alive?'dead':''}"><b>${label}</b> ${p.name}</div>`;
  }).join('');
  return `<div class="roster-bar">${chips}</div>`;
}

function renderRoleReveal(){
  const rows = state.players.map(p=>{
    const info = ROLE_INFO[p.currentRole] || {tag:"citizen", desc:""};
    const changed = p.role !== p.currentRole;
    const joined = p.role==='스파이' && p.spyJoined ? ' (마피아 합류)' : '';
    return `<div class="role-row"><span>${p.name} ${!p.alive?'<span class="small-muted">(사망)</span>':''}</span><span class="role-tag ${info.tag}">${p.role}${changed?` → ${p.currentRole}`:''}${joined}</span></div>`;
  }).join('');
  return `<div class="card"><h3>전체 정체 공개</h3>${rows}</div>`;
}

function renderLog(list){
  const arr = list || state.log;
  if(!arr.length) return `<div class="log"><div class="entry small-muted">아직 기록이 없습니다.</div></div>`;
  return `<div class="log">${arr.map(l=> l.startsWith('§')? `<span class="day-mark">${l.slice(1)}</span>` : `<div class="entry ${l.includes('크리')||l.includes('특종')?'hl':''}">${l}</div>`).join('')}</div>`;
}

/* ---- 전적 업데이트(순위 기반 결과 내보내기) 공용 헬퍼 ---- */
function stripHtmlTags(s){ return s.replace(/<[^>]+>/g, ''); }

// ranking: [{rank:1, names:['가','나']}, {rank:2, names:['다']}, ...]
// 1~3등은 메달 이모지, 4등부터는 "N등"으로 표시. 해당 순위가 아예 없으면 그 줄은 생략한다.
function formatRankingExport(gameName, ranking){
  const medal = {1:'🥇',2:'🥈',3:'🥉'};
  const byRank = {};
  (ranking||[]).forEach(r=>{ byRank[r.rank] = r.names; });
  const lines = ['📌 전적 업데이트', '', `[ ${gameName} ]`, '', `✏️ ${state.dealerName || ''}`];
  [1,2,3].forEach(r=>{
    if(byRank[r] && byRank[r].length){
      lines.push(`${medal[r]} ${byRank[r].join(', ')}`);
    }
  });
  Object.keys(byRank).map(Number).filter(r=>r>3).sort((a,b)=>a-b).forEach(r=>{
    lines.push(`${r}등 ${byRank[r].join(', ')}`);
  });
  return lines.join('\n');
}

function renderRecordExportBlock(gameName, ranking){
  const text = formatRankingExport(gameName, ranking);
  const id = 'recordExport_' + gameName.replace(/[^a-zA-Z0-9가-힣]/g,'');
  return `
    <div class="card">
      <div class="flex-between">

        <button class="secondary" data-action="copyFinalSummary" data-target="${id}">복사하기</button>

      <div class="backs-box" id="${id}" style="white-space:pre-line;margin-top:12px;">${text}</div>
    </div>
  `;
}

/* ---- 게임별 순위 계산 ---- */
function buildMafiaRanking(){
  const winningIsMafia = state.winner === 'mafia';
  const winners = state.players.filter(p=> getTeam(p) === (winningIsMafia?'mafia':'citizen'));
  const losers = state.players.filter(p=> !winners.includes(p));
  const ranking = [{rank:1, names:winners.map(p=>p.name)}];
  if(losers.length) ranking.push({rank:2, names:losers.map(p=>p.name)});
  return ranking;
}

function buildNewMafiaRanking(){
  const winningIsMafia = state.winner === 'mafia';
  const winners = state.players.filter(p=> getNewMafiaTeam(p) === (winningIsMafia?'mafia':'citizen'));
  const losers = state.players.filter(p=> !winners.includes(p));
  const ranking = [{rank:1, names:winners.map(p=>p.name)}];
  if(losers.length) ranking.push({rank:2, names:losers.map(p=>p.name)});
  return ranking;
}

function buildOwRanking(){
  const ow = state.ow;
  const winners = state.players.filter(p=> ow.winners.includes(OW_ROLE_INFO[p.currentRole].team));
  const losers = state.players.filter(p=> !winners.includes(p));
  const ranking = [{rank:1, names:winners.map(p=>p.name)}];
  if(losers.length) ranking.push({rank:2, names:losers.map(p=>p.name)});
  return ranking;
}

function buildLLRanking(){
  const ll = state.ll;
  const sorted = [...state.players].sort((a,b)=> (ll.tokens[b.id]||0) - (ll.tokens[a.id]||0));
  const ranking = [];
  let rank = 1, i = 0;
  while(i < sorted.length){
    const score = ll.tokens[sorted[i].id]||0;
    const group = [];
    while(i<sorted.length && (ll.tokens[sorted[i].id]||0)===score){
      group.push(sorted[i].name);
      i++;
    }
    ranking.push({rank, names:group});
    rank += group.length;
  }
  return ranking;
}

function buildDMRanking(){
  const dm = state.dm;
  return dm.order.map((idx,pos)=>({rank:pos+1, names:[state.players[idx].name]}));
}

function snapshotForHistory(){
  return JSON.parse(JSON.stringify({
    players: state.players, day: state.day, phase: state.phase, log: state.log,
    votes: state.votes, winner: state.winner, night: state.night, ow: state.ow
  }));
}
function pushHistory(){
  state.history.push(snapshotForHistory());
  if(state.history.length > 30) state.history.shift();
}
function undoLast(){
  if(!state.history.length) return;
  const snap = state.history.pop();
  Object.assign(state, snap);
  save(); render();
}

function handleAction(action, el){
  if(action === 'back'){ goBack(); return; }
  if(action === 'selectgame'){
    state.selectedGame = el.dataset.game;
    save(); render(); return;
  }
  if(action === 'gotoSetup'){ setTab('setup'); return; }
  if(action === 'gotoboard'){
    state.assigned = false;
    state.players = [];
    if(state.selectedGame === 'onewolf') state.nameDraftOW = [];
    else if(state.selectedGame === 'loveletter') state.nameDraftLL = [];
    else if(state.selectedGame === 'dalmuti') state.nameDraftDM = [];
    else state.nameDraft = [];
    setTab('board');
    return;
  }
  if(action === 'selectCount'){
    state.playerCount = parseInt(el.dataset.count, 10);
    // 인원수가 바뀌면 이전 이름 초안과 참가자 명단을 모두 정리
    state.nameDraft = [];
    state.players = [];
    state.assigned = false;
    state.customSetup = null; // 새 인원수의 기본 조합으로 재설정
    save(); render(); return;
  }

  if(action === 'incRole'){
    ensureCustomSetup();
    const role = el.dataset.role;
    state.customSetup[role] = (state.customSetup[role] || 0) + 1;
    save(); render(); return;
  }
  if(action === 'decRole'){
    ensureCustomSetup();
    const role = el.dataset.role;
    state.customSetup[role] = Math.max(0, (state.customSetup[role] || 0) - 1);
    save(); render(); return;
  }
  if(action === 'resetComposition'){
    const n = nearestSetupCount(state.playerCount);
    state.customSetup = {...SETUPS[n]};
    state.customSetupCount = n;
    save(); render(); return;
  }

  if(action === 'startRolePickMafia'){
    const inputs = Array.from(document.querySelectorAll('.nameInput'));
    const names = inputs.map(i=>i.value.trim());
    ensureCustomSetup();
    const setup = state.customSetup;
    const totalNeeded = Object.values(setup).reduce((a,b)=>a+b,0);
    if(names.some(n=>!n)){
      alert(`빈칸 없이 참가자 이름을 모두 입력해주세요. (${totalNeeded}명 필요)`);
      return;
    }
    let rolePool = [];
    Object.entries(setup).forEach(([role,count])=>{
      for(let i=0;i<count;i++) rolePool.push(role);
    });
    // 셔플
    for(let i=rolePool.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [rolePool[i], rolePool[j]] = [rolePool[j], rolePool[i]];
    }
    state.rolePick = {
      gameType: 'mafia',
      names,
      layout: rolePool.map((role,i)=>({num:i+1, role})),
    };
    save(); render();
    return;
  }

  if(action === 'startGame'){
    if(state.selectedGame === 'onewolf'){

      initNewMafiaGame();
    } else if(state.selectedGame === 'loveletter'){
      const inputs = Array.from(document.querySelectorAll('.nameInputLL'));
      const names = inputs.map(i=>i.value.trim());
