    state.assigned = false;
    state.customSetupOW = null;
    save(); render(); return;
  }
  if(action === 'incRoleOW'){
    ensureCustomSetupOW();
    const role = el.dataset.role;
    const step = role === '비밀요원' ? 2 : 1;
    state.customSetupOW[role] = (state.customSetupOW[role] || 0) + step;
    save(); render(); return;
  }
  if(action === 'decRoleOW'){
    ensureCustomSetupOW();
    const role = el.dataset.role;
    const step = role === '비밀요원' ? 2 : 1;
    state.customSetupOW[role] = Math.max(0, (state.customSetupOW[role] || 0) - step);
    save(); render(); return;
  }
  if(action === 'resetCompositionOW'){
    state.customSetupOW = null;
    state.customSetupOWCount = null;
    ensureCustomSetupOW();
    save(); render(); return;
  }

  if(action === 'startRolePickOW'){
    const inputs = Array.from(document.querySelectorAll('.nameInput'));
    const names = inputs.map(i=>i.value.trim());
    const n = nearestOwCount(state.playerCountOW);
    ensureCustomSetupOW();
    const setup = state.customSetupOW;
    const target = n + 3;
    const total = Object.values(setup).reduce((a,b)=>a+b,0);
    if((setup['비밀요원']||0) % 2 !== 0){
      alert('비밀요원은 항상 2명(짝수)이어야 합니다.');
      return;
    }
    if(total !== target){
      alert(`카드 구성 합계가 ${target}장이어야 합니다. (현재 ${total}장)`);
      return;
    }
    if(names.some(nm=>!nm)){
      alert(`빈칸 없이 참가자 이름을 모두 입력해주세요. (${n}명 필요)`);
      return;
    }
    let deck = [];
    Object.entries(setup).forEach(([role,count])=>{
      for(let i=0;i<count;i++) deck.push(role);
    });
    // 셔플
    for(let i=deck.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    state.rolePick = {
      gameType: 'ow',
      names,
      layout: deck.map((role,i)=>({num:i+1, role})),
    };
    save(); render();
    return;
  }

  if(action === 'confirmRolePick'){
    const rp = state.rolePick;
    const selects = Array.from(document.querySelectorAll('.rolePickSelect'));
    const chosen = selects.map(s=>s.value);
    if(chosen.some(v=>!v)){ alert('모든 사람이 번호를 선택해야 합니다.'); return; }
    const nums = chosen.map(v=>parseInt(v,10));
    if(new Set(nums).size !== nums.length){ alert('서로 다른 번호를 선택해야 합니다.'); return; }

    const pickedRoles = nums.map(num => rp.layout.find(s=>s.num===num).role);

    if(rp.gameType === 'mafia'){
      state.players = rp.names.map((name,i)=>({
        id: 'p'+i+'_'+Date.now(),
        name, role: pickedRoles[i], currentRole: pickedRoles[i], alive:true,
        spyJoined:false, shieldUsed:false, voteBlocked:false,
        revCount:0, sniperRevealed:false, sniperArmed:false, standInId:null,
        masterId:null, reviveUsed:false, jjikmaeUsed:false, otakuUsed:false
      }));
      state.assigned = true;
      const maid = state.players.find(p=>p.role==='하녀');
      if(maid){
        const others = state.players.filter(p=>p.id!==maid.id);
        if(others.length){
          maid.masterId = others[Math.floor(Math.random()*others.length)].id;
        }
      }
    } else if(rp.gameType === 'newmafia'){
      state.players = rp.names.map((name,i)=>({
        id: 'p'+i+'_'+Date.now(),
        name, role: pickedRoles[i], currentRole: pickedRoles[i], alive:true,
        voteBlocked:false, spyJoined:false, thiefJoined:false,
        loverPartnerId:null, soldierKillUsed:false, shamanKillUsed:false
      }));
      state.assigned = true;
      const loverMembers = state.players.filter(p=>p.role==='연인');
      if(loverMembers.length===2){
        loverMembers[0].loverPartnerId = loverMembers[1].id;
        loverMembers[1].loverPartnerId = loverMembers[0].id;
      }
    } else if(rp.gameType === 'ow'){
      state.players = rp.names.map((name,i)=>({
        id: 'p'+i+'_'+Date.now(),
        name, role: pickedRoles[i], currentRole: pickedRoles[i], alive:true
      }));
      const pickedNums = new Set(nums);
      const centerCards = rp.layout.filter(s=>!pickedNums.has(s.num)).map(s=>s.role);
      state.ow = state.ow || {};
      state.ow.centerCards = centerCards;
      state.assigned = true;
    }

    state.rolePick = null;
    save(); render();
    return;
  }

  if(action === 'owNextStep'){ owAdvanceStep(); return; }

  if(action === 'owWolfPeek'){
    const sel = document.getElementById('owCenterSelect');
    const idx = parseInt(sel.value, 10);
    const wolf = state.players.find(p=>p.role==='늑대인간');
    const role = state.ow.centerCards[idx];
    state.ow.lastResult = `${wolf.name}에게 알려주세요 — 센터 카드 ${idx+1}번은 <b>${role}</b>입니다.`;
    state.ow.log.push(`(비공개) 늑대인간 ${wolf.name}이(가) 센터 카드 ${idx+1}번(${role})을 확인했습니다.`);
    state.ow.stepResolved = true;
    save(); render();
    return;
  }

  if(action === 'owSeerMode'){
    state.ow.seerMode = el.dataset.mode;
    save(); render();
    return;
  }

  if(action === 'owSeerCenterConfirm'){
    const s1 = document.getElementById('owSeerC1');
    const s2 = document.getElementById('owSeerC2');
    const i1 = parseInt(s1.value, 10), i2 = parseInt(s2.value, 10);
    if(i1 === i2){ alert('서로 다른 센터 카드 2장을 선택해주세요.'); return; }
    const seer = state.players.find(p=>p.role==='천리안');
    const r1 = state.ow.centerCards[i1], r2 = state.ow.centerCards[i2];
    state.ow.lastResult = `${seer.name}에게 알려주세요 — 센터 카드 ${i1+1}번: <b>${r1}</b>, ${i2+1}번: <b>${r2}</b>`;
    state.ow.log.push(`(비공개) 천리안 ${seer.name}이(가) 센터 카드 ${i1+1},${i2+1}번(${r1}, ${r2})을 확인했습니다.`);
    state.ow.stepResolved = true;
    save(); render();
    return;
  }

  if(action === 'owSeerPlayerConfirm'){
    const sel = document.getElementById('owSeerTarget');
    const target = getPlayer(sel.value);
    const seer = state.players.find(p=>p.role==='천리안');
    state.ow.lastResult = `${seer.name}에게 알려주세요 — ${target.name}의 카드는 <b>${target.currentRole}</b>입니다.`;
    state.ow.log.push(`(비공개) 천리안 ${seer.name}이(가) ${target.name}의 카드(${target.currentRole})를 확인했습니다.`);
    state.ow.stepResolved = true;
    save(); render();
    return;
  }

  if(action === 'owRobberConfirm'){
    const sel = document.getElementById('owRobberTarget');
    const target = getPlayer(sel.value);
    const robber = state.players.find(p=>p.role==='강도');
    const robberOld = robber.currentRole;
    const targetOld = target.currentRole;
    robber.currentRole = targetOld;
    target.currentRole = robberOld;
    state.ow.transfers = state.ow.transfers || [];
    state.ow.transfers.push({role:robberOld, from:robber.name, to:target.name});
    state.ow.transfers.push({role:targetOld, from:target.name, to:robber.name});
    state.ow.lastResult = `${robber.name}에게 알려주세요 — 이제 당신의 카드는 <b>${robber.currentRole}</b>입니다.`;
    state.ow.log.push(`(비공개) 강도 ${robber.name}이(가) ${target.name}과(와) 카드를 바꿨습니다. (강도의 새 카드: ${robber.currentRole})`);
    state.ow.stepResolved = true;
    save(); render();
    return;
  }

  if(action === 'owTroubleConfirm'){
    const s1 = document.getElementById('owTrouble1');
    const s2 = document.getElementById('owTrouble2');
    const p1 = getPlayer(s1.value), p2 = getPlayer(s2.value);
    if(!p1 || !p2 || p1.id === p2.id){ alert('서로 다른 두 명을 선택해주세요.'); return; }
    const p1Old = p1.currentRole;
    const p2Old = p2.currentRole;
    p1.currentRole = p2Old;
    p2.currentRole = p1Old;
    state.ow.transfers = state.ow.transfers || [];
    state.ow.transfers.push({role:p1Old, from:p1.name, to:p2.name});
    state.ow.transfers.push({role:p2Old, from:p2.name, to:p1.name});
    state.ow.lastResult = `문제아가 능력을 사용했습니다. (결과는 비공개)`;
    state.ow.log.push(`(비공개) 문제아가 ${p1.name}과(와) ${p2.name}의 카드를 맞바꿨습니다.`);
    state.ow.stepResolved = true;
    save(); render();
    return;
  }

  if(action === 'owTroubleSkip'){
    state.ow.lastResult = `문제아가 활동을 포기했습니다.`;
    state.ow.log.push(`문제아가 활동을 포기했습니다.`);
    state.ow.stepResolved = true;
    save(); render();
    return;
  }

  if(action === 'owDrunkConfirm'){
    const sel = document.getElementById('owDrunkCenter');
    const idx = parseInt(sel.value, 10);
    const drunk = state.players.find(p=>p.role==='주정뱅이');
    const drunkOld = drunk.currentRole;
    const centerOld = state.ow.centerCards[idx];
    drunk.currentRole = centerOld;
    state.ow.centerCards[idx] = drunkOld;
    state.ow.transfers = state.ow.transfers || [];
    state.ow.transfers.push({role:drunkOld, from:drunk.name, to:`센터 ${idx+1}번`});
    state.ow.transfers.push({role:centerOld, from:`센터 ${idx+1}번`, to:drunk.name});
    state.ow.lastResult = `주정뱅이가 센터 카드 ${idx+1}번과 카드를 교환했습니다. (본인도 결과를 모릅니다)`;
    state.ow.log.push(`(비공개) 주정뱅이가 센터 카드 ${idx+1}번과 교환했습니다.`);
    state.ow.stepResolved = true;
    save(); render();
    return;
  }

  if(action === 'owGotoDay'){
    state.ow.phase = 'day';
    state.ow.log.push('§낮이 되었습니다. 토론 후 최다 득표자를 선택하세요.');
    save(); render();
    return;
  }

  if(action === 'owSelectExecution'){
    state.ow.pendingExecution = state.ow.pendingExecution === el.dataset.pid ? null : el.dataset.pid;
    save(); render();
    return;
  }

  if(action === 'owConfirmExecution'){
    const hunterSel = document.getElementById('owHunterTarget');
    state.ow.hunterTarget = hunterSel ? hunterSel.value : null;
    pushHistory();
    runOwDayResolution(state.ow.pendingExecution);
    return;
  }

  if(action === 'owNoExecution'){
    pushHistory();
    runOwDayResolution(null);
    return;
  }

  if(action === 'resetGame'){
    state = {
      tab:'home', selectedGame:'mafia', theme: state.theme, dealerName: state.dealerName, rolePick: null, playerCount: state.playerCount,
      customSetup: null, customSetupCount: null,
      players: [], nameDraft: [], assigned:false, gameStarted:false, day:1, phase:'night',
      log:[], night:{parasite:null,spy:null,clone:null,mafia:null,mafiaActor:null,doctor:null,police:null,detective:null,mindreader:null,shaman:null,medium:null,nurse:null,taxi1:null,taxi2:null,gangster:null,thief:null,rich:null,sniperReveal:null,sniperKill:null,jjik1:null,jjik2:null,jjik3:null,revive:null},
      votes:{}, politicianUsed:false, winner:null, history:[], pendingExecution:null,
      firstDeathHandled:false, nurseBecameDoctor:false, terroristCompanion:null,
      playerCountOW: state.playerCountOW, nameDraftOW: [], customSetupOW: null, customSetupOWCount: null, ow: null,
      playerCountNew: state.playerCountNew, customSetupNew: null, customSetupNewCount: null,
      night2: {mafia:null, mafiaActor:null, spy:null, thief:null, doctor:null, police:null, soldier:null, medium:null,
               lovers:null, shaman:null, reporter:null, detective:null, stalker:null},
      newMafia: {coupleKillUsed:false, firstDeathHandled:false},
      playerCountLL: state.playerCountLL, nameDraftLL: [], llVersion: state.llVersion, llTokenGoal: state.llTokenGoal, ll: null,
      playerCountDM: state.playerCountDM, nameDraftDM: [], dm: null
    };
    save(); render();
    return;
  }
}

function handleFirstDeath(deadPlayer){
  if(state.firstDeathHandled) return;
  state.firstDeathHandled = true;
  const yobu = state.players.find(p=>p.role==='백수' && p.alive && p.id!==deadPlayer.id);
  if(yobu){
    yobu.currentRole = deadPlayer.currentRole;
    state.log.push(`백수 ${yobu.name}이(가) 첫 사망자의 직업(${deadPlayer.currentRole})을 이어받았습니다.`);
  }
}

function handleMaidLink(deadPlayer){
  const maid = state.players.find(p=>p.masterId===deadPlayer.id && p.alive);
  if(maid){
    maid.alive = false;
    state.log.push(`주인 ${deadPlayer.name}이(가) 죽어 하녀 <b>${maid.name}</b>도 함께 사망했습니다.`);
    handleFirstDeath(maid);
  }
}

function handleNightTerroristChain(deadPlayer){
  if(deadPlayer.currentRole !== '테러리스트') return;
  const mafiaMembers = state.players.filter(p=>p.alive && getTeam(p)==='mafia' && p.id!==deadPlayer.id);
  if(mafiaMembers.length){
    const companion = mafiaMembers[Math.floor(Math.random()*mafiaMembers.length)];
    companion.alive = false;
    state.log.push(`테러리스트의 죽음과 함께 마피아 팀원 <b>${companion.name}</b>도 사망했습니다.`);
    handleFirstDeath(companion);
    handleMaidLink(companion);
  }
}

function runNightResolution(){
  const {parasite, spy, clone, mafia, mafiaActor: mafiaActorId, taxi1, taxi2, doctor, police, detective, mindreader, shaman, medium, nurse,
         gangster, thief, rich, sniperReveal, sniperKill, jjik1, jjik2, jjik3, revive} = state.night;
  const lines = [];
  const disabledRoles = new Set();
  const actionsLog = []; // {role, targetId} - 명탐정 조회용

  // 이번 밤 습격을 실행하는 마피아 결정
  const aliveMafiaMembers = state.players.filter(p=>p.currentRole==='마피아' && p.alive);
  let mafiaActor = null;
  if(aliveMafiaMembers.length === 1) mafiaActor = aliveMafiaMembers[0];
  else if(aliveMafiaMembers.length >= 2 && mafiaActorId) mafiaActor = getPlayer(mafiaActorId);

  // 1. 기생 - 능력 봉쇄
  if(parasite){
    const t = getPlayer(parasite);
    if(t && t.alive){
      disabledRoles.add(t.currentRole);
      actionsLog.push({role:'기생', targetId:t.id});
      lines.push(`기생이 <b>${t.name}</b>(${t.currentRole})의 능력을 봉쇄했습니다.`);
    }
  }

  // 2. 스파이 - 조사 + 마피아 합류
  if(spy && !disabledRoles.has('스파이')){
    const spyPlayer = state.players.find(p=>p.currentRole==='스파이' && p.alive);
    const t = getPlayer(spy);
    if(spyPlayer && t){
      actionsLog.push({role:'스파이', targetId:t.id});
      const isMafiaTeam = getTeam(t) === 'mafia';
      if(isMafiaTeam && !spyPlayer.spyJoined){
        spyPlayer.spyJoined = true;
        lines.push(`[스파이 전용 안내] ${t.name}은(는) 마피아 팀입니다. 스파이 ${spyPlayer.name}이(가) 마피아 팀에 합류했습니다.`);
      } else {
        lines.push(`[스파이 전용 안내] ${t.name} 조사 결과 → <b>${isMafiaTeam?'마피아 팀':'시민'}</b>`);
      }
    }
  } else if(spy && disabledRoles.has('스파이')){
    lines.push('스파이의 조사가 봉쇄되어 결과를 알 수 없었습니다.');
  }

  // 2.5 신병 - 복제 (첫날 밤 제외, 실제 효과는 딜러 재량)
  if(clone && state.day > 1 && !disabledRoles.has('신병')){
    const clonePlayer = state.players.find(p=>p.currentRole==='신병' && p.alive);
    const t = getPlayer(clone);
    if(clonePlayer && t){
      actionsLog.push({role:'신병', targetId:t.id});
      lines.push(`[신병 전용 안내] ${clonePlayer.name}이(가) ${t.name}(${t.currentRole})의 능력을 복제했습니다. 실제 발동 여부는 딜러가 재량껏 반영해주세요.`);
    }
  }

  // 3. 마피아 - 습격 대상 결정
  let victim = null;
  if(mafia && !disabledRoles.has('마피아')){
    victim = getPlayer(mafia);
    actionsLog.push({role:'마피아', targetId:mafia});
  } else if(mafia && disabledRoles.has('마피아')){
    lines.push('마피아 팀은 이번 밤 아무 행동도 하지 못했습니다.');
  }

  // 4. 택시기사 - 대상 교체
  if(taxi1 && taxi2 && taxi1 !== taxi2 && !disabledRoles.has('택시기사')){
    actionsLog.push({role:'택시기사', targetId:taxi1});
    actionsLog.push({role:'택시기사', targetId:taxi2});
    if(victim && (victim.id === taxi1 || victim.id === taxi2)){
      const otherId = victim.id === taxi1 ? taxi2 : taxi1;
      const other = getPlayer(otherId);
      lines.push(`택시기사의 개입으로 습격 대상이 <b>${other.name}</b>(으)로 바뀌었습니다.`);
      victim = other;
    }
  }

  // 5. 혁명군 - 2회까지 자동 생존, 3회째 무조건 사망
  let forcedDeath = false;
  if(victim && victim.currentRole === '혁명군'){
    victim.revCount = (victim.revCount || 0) + 1;
    if(victim.revCount < 3){
      lines.push(`<b>${victim.name}</b>이(가) 혁명군 능력으로 ${victim.revCount}번째 지목을 버텨내고 생존했습니다.`);
      victim = null;
    } else {
      lines.push(`<b>${victim.name}</b>은(는) 혁명군 능력이 소진되어(3번째 지목) 무조건 사망합니다.`);
      forcedDeath = true;
    }
  }

  // 6. 인형사/게이 - 자동 생존 (1회, 강제사망이 아닌 경우만)
  let healed = false;
  if(victim && !forcedDeath && !victim.shieldUsed && (victim.currentRole === '인형사' || victim.currentRole === '게이')){
    victim.shieldUsed = true;
    lines.push(`<b>${victim.name}</b>이(가) 습격당했지만 (${victim.currentRole}) 능력으로 자동 생존했습니다.`);
    victim = null;
  }

  // 7. 의사 - 치료 (강제사망이 아닌 경우만)
  if(victim && !forcedDeath && doctor && !disabledRoles.has('의사') && doctor === victim.id){
    healed = true;
    actionsLog.push({role:'의사', targetId:doctor});
  } else if(doctor){
    actionsLog.push({role:'의사', targetId:doctor});
  }

  if(victim){
    if(healed){
      lines.push(`${victim.name}이(가) 습격당했으나 의사의 치료로 생존했습니다.`);
    } else {
      victim.alive = false;
      lines.push(`<b>${victim.name}</b>이(가) 밤 사이 마피아${mafiaActor?`(${mafiaActor.name})`:''}에게 습격당해 사망했습니다.`);
      handleNightTerroristChain(victim);
      handleFirstDeath(victim);
      handleMaidLink(victim);
    }
  }

  // 8. 경찰 - 조사
  if(police){
    if(disabledRoles.has('경찰')){
      lines.push('경찰의 조사가 봉쇄되어 결과를 알 수 없었습니다.');
    } else {
      const t = getPlayer(police);
      actionsLog.push({role:'경찰', targetId:police});
      const isMafiaRole = t.currentRole === '마피아';
      lines.push(`[경찰 전용 안내] ${t.name} 조사 결과 → <b>${isMafiaRole?'마피아 (경찰 크리!)':'시민'}</b>`);
    }
  }

  // 9. 탐정 - 스파이/기생 추리 (성공 시 명탐정 진급)
  if(detective && !disabledRoles.has('탐정')){
    const detectivePlayer = state.players.find(p=>p.currentRole==='탐정' && p.alive);
    const t = getPlayer(detective);
    if(detectivePlayer && t){
      actionsLog.push({role:'탐정', targetId:detective});
      const guessed = (t.currentRole === '스파이' || t.currentRole === '기생');
      if(guessed){
        detectivePlayer.currentRole = '명탐정';
        lines.push(`[탐정 전용 안내] 추리 적중! ${t.name}은(는) ${t.currentRole}입니다. ${detectivePlayer.name}이(가) 명탐정으로 진급했습니다.`);
      } else {
        lines.push(`[탐정 전용 안내] 추리 실패. ${t.name}은(는) 스파이도 기생도 아닙니다.`);
      }
    }
  } else if(detective && disabledRoles.has('탐정')){
    lines.push('탐정의 추리가 봉쇄되어 결과를 알 수 없었습니다.');
  }

  // 10. 명탐정 - 이번 밤 능력을 받은 대상 확인
  if(mindreader){
    if(disabledRoles.has('명탐정')){
      lines.push('명탐정의 능력이 봉쇄되어 결과를 알 수 없었습니다.');
    } else {
      const t = getPlayer(mindreader);
      const usedOn = actionsLog.filter(a=>a.targetId===mindreader).map(a=>a.role);
      const uniqueRoles = [...new Set(usedOn)];
      lines.push(`[명탐정 전용 안내] ${t.name}에게 이번 밤 사용된 능력: <b>${uniqueRoles.length ? uniqueRoles.join(', ') : '없음'}</b>`);
    }
  }

  // 11. 무당 / 영매 - 사망자 직업 확인
  if(shaman){
    if(disabledRoles.has('무당')){
      lines.push('무당의 능력이 봉쇄되어 결과를 알 수 없었습니다.');
    } else {
      const t = getPlayer(shaman);
      if(t) lines.push(`[무당 전용 안내] 고인 ${t.name}의 생전 직업은 <b>${t.currentRole}</b>이었습니다.`);
    }
  }
  if(medium){
    if(disabledRoles.has('영매')){
      lines.push('영매의 능력이 봉쇄되어 결과를 알 수 없었습니다.');
    } else {
      const t = getPlayer(medium);
      if(t) lines.push(`[영매 전용 안내] 고인 ${t.name}의 생전 직업은 <b>${t.currentRole}</b>이었습니다.`);
    }
  }

  // 12. 간호사 - 생사 확인 + 의사 사망 시 자동 승계
  if(nurse && !disabledRoles.has('간호사')){
    const nursePlayer = state.players.find(p=>p.currentRole==='간호사' && p.alive);
    const t = getPlayer(nurse);
    if(nursePlayer && t){
      actionsLog.push({role:'간호사', targetId:nurse});
      lines.push(`[간호사 전용 안내] ${t.name}은(는) 현재 <b>${t.alive?'생존':'사망'}</b> 상태입니다.`);
    }
  }
  const deadDoctor = state.players.find(p=>p.role==='의사' && !p.alive);
  const activeNurse = state.players.find(p=>p.currentRole==='간호사' && p.alive);
  if(deadDoctor && activeNurse && !state.nurseBecameDoctor){
    activeNurse.currentRole = '의사';
    state.nurseBecameDoctor = true;
    lines.push(`의사가 사망하여 간호사 ${activeNurse.name}이(가) 의사 능력을 이어받았습니다.`);
  }

  // 13. 건달 - 다음 낮 투표 불가
  state.players.forEach(p=>{ p.voteBlocked = false; }); // 매 밤 초기화
  if(gangster && !disabledRoles.has('건달')){
    const t = getPlayer(gangster);
    if(t && t.alive){
      actionsLog.push({role:'건달', targetId:gangster});
      t.voteBlocked = true;
      lines.push(`건달이 <b>${t.name}</b>의 다음 낮 투표권을 제거했습니다.`);
    }
  } else if(gangster && disabledRoles.has('건달')){
    lines.push('건달의 능력이 봉쇄되어 발동하지 못했습니다.');
  }

  // 14. 도둑 - 직업 훔치기
  if(thief && !disabledRoles.has('도둑')){
    const thiefPlayer = state.players.find(p=>p.currentRole==='도둑' && p.alive);
    const t = getPlayer(thief);
    if(thiefPlayer && t && t.alive){
      actionsLog.push({role:'도둑', targetId:thief});
      const stolenRole = t.currentRole;
      thiefPlayer.currentRole = stolenRole;
      t.currentRole = '시민';
      lines.push(`도둑이 <b>${t.name}</b>의 직업(${stolenRole})을 훔쳤습니다. ${t.name}은(는) 이제 시민입니다.`);
    }
  } else if(thief && disabledRoles.has('도둑')){
    lines.push('도둑의 능력이 봉쇄되어 발동하지 못했습니다.');
  }

  // 15. 부자 - 대타 미리 지정 (효과는 낮에 발동)
  if(rich){
    const richPlayer = state.players.find(p=>p.currentRole==='부자' && p.alive);
    if(richPlayer){
      richPlayer.standInId = rich;
      lines.push(`부자 ${richPlayer.name}이(가) 대타를 지정해두었습니다. (내용은 비공개)`);
    }
  }

  // 16. 저격수 - 공개 지목 또는 저격
  if(sniperReveal){
    const sniperPlayer = state.players.find(p=>p.currentRole==='저격수' && p.alive && !p.sniperRevealed);
    const t = getPlayer(sniperReveal);
    if(sniperPlayer && t){
      sniperPlayer.sniperRevealed = true;
      sniperPlayer.sniperArmed = true;
      lines.push(`저격수 ${sniperPlayer.name}이(가) ${t.name}을(를) 지목했습니다. ${t.name}의 직업은 <b>${t.currentRole}</b>! 다음 밤부터 저격수의 저격 능력이 활성화됩니다.`);
    }
  }
  if(sniperKill){
    const sniperPlayer = state.players.find(p=>p.currentRole==='저격수' && p.alive && p.sniperArmed);
    const t = getPlayer(sniperKill);
    if(sniperPlayer && t && t.alive){
      t.alive = false;
      lines.push(`저격수 ${sniperPlayer.name}의 저격으로 <b>${t.name}</b>이(가) 사망했습니다.`);
      handleNightTerroristChain(t);
      handleFirstDeath(t);
      handleMaidLink(t);
    }
  }

  // 17. 찍매 - 3명 중 마피아 수 확인 (1회)
  if(jjik1 && jjik2 && jjik3){
    const jjikPlayer = state.players.find(p=>p.currentRole==='찍매' && p.alive && !p.jjikmaeUsed);
    const targets = [jjik1, jjik2, jjik3].map(id=>getPlayer(id)).filter(Boolean);
    if(jjikPlayer && targets.length===3){
      jjikPlayer.jjikmaeUsed = true;
      const mafiaCount = targets.filter(t=>t.currentRole==='마피아').length;
      lines.push(`[찍매 전용 안내] 지목한 세 명 중 마피아는 <b>${mafiaCount}명</b>입니다.`);
    }
  }

  // 18. 환생사 - 부활 (1회)
  if(revive){
    const revivalist = state.players.find(p=>p.currentRole==='환생사' && p.alive && !p.reviveUsed);
    const t = getPlayer(revive);
    if(revivalist && t && !t.alive){
      revivalist.reviveUsed = true;
      t.alive = true;
      lines.push(`환생사 ${revivalist.name}이(가) <b>${t.name}</b>을(를) 되살렸습니다.`);
    }
  }

  if(!lines.length) lines.push('이번 밤은 아무 능력도 사용되지 않았습니다.');

  state.log.push(...lines);

  const w = checkWinner();
  if(w){
    state.winner = w;
  } else {
    state.phase = 'day';
    state.log.push(`§${state.day}일차 낮이 되었습니다. 토론 후 투표해주세요.`);
    state.votes = {};
  }
  state.night = {parasite:null, spy:null, clone:null, mafia:null, mafiaActor:null, doctor:null, police:null, detective:null, mindreader:null, shaman:null, medium:null, nurse:null, taxi1:null, taxi2:null, gangster:null, thief:null, rich:null, sniperReveal:null, sniperKill:null, jjik1:null, jjik2:null, jjik3:null, revive:null};
  save(); render();
}

function runDayResolution(pid, judgeFlip, companionId){
  const p = getPlayer(pid);
  if(p){
    let survives = false;
    let reason = '';
    if(judgeFlip){ survives = true; reason = '판사가 결과를 뒤집음'; }
    else if(p.currentRole === '정치인'){ survives = true; reason = '정치인은 투표로 죽지 않음'; }

    if(survives){
      state.log.push(`<b>${p.name}</b>이(가) 처형되지 않고 생존했습니다. (${reason}) 역할이 공개됩니다: <b>${p.currentRole}</b>`);
    } else {
      p.alive = false;
      state.log.push(`<b>${p.name}</b>(${p.role})이(가) 투표로 처형되었습니다.`);
      if(p.currentRole === '테러리스트' && companionId){
        const comp = getPlayer(companionId);
        if(comp && comp.alive){
          comp.alive = false;
          state.log.push(`테러리스트가 <b>${comp.name}</b>을(를) 함께 처형시켰습니다.`);
          handleFirstDeath(comp);
          handleMaidLink(comp);
        }
      }
      handleFirstDeath(p);
      handleMaidLink(p);
    }
  }

  const w = checkWinner();
  if(w){
    state.winner = w;
  } else {
    state.day += 1;
    state.phase = 'night';
    state.log.push(`§${state.day}일차 밤이 되었습니다.`);
    state.votes = {};
  }
  save(); render();
}

/* ---- 신 마피아 게임 로직 ---- */
function initNewMafiaGame(){
  state.gameStarted = true;
  state.day = 1; state.phase = 'night'; state.log = ['§1일차 밤이 되었습니다.'];
  state.winner = null;
  state.history = [];
  state.newMafia = {coupleKillUsed:false, firstDeathHandled:false};
}

function checkNewMafiaWinner(){
  const alive = alivePlayers();
  const mafiaAlive = alive.filter(p=>getNewMafiaTeam(p)==='mafia').length;
  const citizenAlive = alive.length - mafiaAlive;
  // 원조 마피아 전멸 여부(스파이는 항상 시민 취급이므로 이미 mafiaAlive에서 제외됨)
  if(mafiaAlive === 0) return 'citizen';
  if(mafiaAlive >= citizenAlive) return 'mafia';
  return null;
}

function newMafiaHandleFirstDeath(deadPlayer){
  if(state.newMafia.firstDeathHandled) return;
  state.newMafia.firstDeathHandled = true;
  const yobu = state.players.find(p=>p.role==='백수' && p.alive && p.id!==deadPlayer.id);
  if(yobu){
    yobu.currentRole = deadPlayer.currentRole;
    state.log.push(`백수 ${yobu.name}이(가) 첫 사망자의 직업(${deadPlayer.currentRole})을 이어받았습니다.`);
    if(yobu.currentRole === '마피아'){
      state.log.push(`백수가 마피아 팀에 합류했습니다. 딜러가 마피아 채팅방 등에 안내해주세요.`);
    } else if(yobu.currentRole === '연인'){
      state.log.push(`백수가 연인 팀에 합류했습니다. 딜러가 연인 채팅방 등에 안내해주세요.`);
    }
  }
}

function runNewMafiaNightResolution(){
  const {spy, mafia, mafiaActor: mafiaActorId, soldier, lovers, shaman, doctor, police, medium, reporter, detective, stalker} = state.night2;
  const lines = [];
  const actionsLog = []; // {actorId, targetId} - 스토커 조회용

  // 이번 밤 습격을 실행하는 마피아 결정
  const aliveMafiaMembers = state.players.filter(p=>p.role==='마피아' && p.alive);
  let mafiaActor = null;
  if(aliveMafiaMembers.length === 1) mafiaActor = aliveMafiaMembers[0];
  else if(aliveMafiaMembers.length >= 2 && mafiaActorId) mafiaActor = getPlayer(mafiaActorId);

  // 1. 스파이 - 마피아 지목 (마피아 숫자에는 포함되지 않는 순수 정보/합류 플레이버)
  if(spy){
    const spyPlayer = state.players.find(p=>p.role==='스파이' && p.alive);
    const t = getPlayer(spy);
    if(spyPlayer && t){
      actionsLog.push({actorId:spyPlayer.id, targetId:t.id});
      if(t.role === '마피아'){
        spyPlayer.spyJoined = true;
        lines.push(`[스파이 전용 안내] ${t.name}은(는) 마피아입니다. 스파이 ${spyPlayer.name}이(가) 마피아 팀에 합류했습니다. (마피아 숫자에는 포함되지 않습니다)`);
      } else {
        lines.push(`[스파이 전용 안내] ${t.name}은(는) 마피아가 아닙니다.`);
      }
    }
  }

  // 2. 마피아 - 습격 대상
  let victim = null;
  if(mafia){
    victim = getPlayer(mafia);
    actionsLog.push({actorId: mafiaActor ? mafiaActor.id : 'mafia', targetId:mafia});
  }

  // 3. 군인 - 2번째 밤부터 1회 습격 (마피아 습격과 별개로 발동)
  let soldierVictim = null;
  if(soldier && state.day >= 2){
    const soldierPlayer = state.players.find(p=>p.currentRole==='군인' && p.alive && !p.soldierKillUsed);
    const t = getPlayer(soldier);
    if(soldierPlayer && t){
      soldierPlayer.soldierKillUsed = true;
      soldierVictim = t;
      actionsLog.push({actorId:soldierPlayer.id, targetId:t.id});
    }
  }

  // 4. 연인 - 2번째 밤부터 1회 습격 (둘 다 생존 시)
  let loversVictim = null;
  if(lovers && state.day >= 2 && !state.newMafia.coupleKillUsed){
    const loverMembers = state.players.filter(p=>p.currentRole==='연인' && p.alive);
    const t = getPlayer(lovers);
    if(loverMembers.length===2 && t){
      state.newMafia.coupleKillUsed = true;
      loversVictim = t;
      actionsLog.push({actorId:loverMembers[0].id, targetId:t.id});
    }
  }

  // 5. 무당 - 1회 아무나 습격
  let shamanVictim = null;
  if(shaman){
    const shamanPlayer = state.players.find(p=>p.currentRole==='무당' && p.alive && !p.shamanKillUsed);
    const t = getPlayer(shaman);
    if(shamanPlayer && t){
      shamanPlayer.shamanKillUsed = true;
      shamanVictim = t;
      actionsLog.push({actorId:shamanPlayer.id, targetId:t.id});
    }
  }

  // 6. 의사 - 치료 (마피아 습격에만 효과)
  let healed = false;
  if(victim && doctor && doctor === victim.id){
    healed = true;
  }
  if(doctor){
    const doctorPlayer = state.players.find(p=>p.currentRole==='의사' && p.alive);
    if(doctorPlayer) actionsLog.push({actorId:doctorPlayer.id, targetId:doctor});
  }

  // 사망 처리 (마피아 습격)
  if(victim){
    // 군인이 마피아의 표적이면 그 밤의 마피아 실행자와 동반 자폭
    if(victim.currentRole === '군인'){
      victim.alive = false;
      lines.push(`<b>${victim.name}</b>이(가) 마피아의 습격을 받고 자폭했습니다.`);
      if(mafiaActor && mafiaActor.alive){
        mafiaActor.alive = false;
        lines.push(`군인의 자폭으로 마피아 실행자 <b>${mafiaActor.name}</b>도 함께 사망했습니다.`);
        newMafiaHandleFirstDeath(mafiaActor);
      }
      newMafiaHandleFirstDeath(victim);
    } else if(healed){
      lines.push(`${victim.name}이(가) 습격당했으나 의사의 치료로 생존했습니다.`);
    } else {
      victim.alive = false;
      lines.push(`<b>${victim.name}</b>이(가) 밤 사이 마피아${mafiaActor?`(${mafiaActor.name})`:''}에게 습격당해 사망했습니다.`);
      newMafiaHandleFirstDeath(victim);
    }
  }

  // 군인 1회용 습격 결과
  if(soldierVictim && soldierVictim.alive){
    soldierVictim.alive = false;
    lines.push(`군인의 습격으로 <b>${soldierVictim.name}</b>이(가) 사망했습니다.`);
    newMafiaHandleFirstDeath(soldierVictim);
  }
  // 연인 1회용 습격 결과
  if(loversVictim && loversVictim.alive){
    loversVictim.alive = false;
    lines.push(`연인의 습격으로 <b>${loversVictim.name}</b>이(가) 사망했습니다.`);
    newMafiaHandleFirstDeath(loversVictim);
  }
  // 무당 1회용 습격 결과
  if(shamanVictim && shamanVictim.alive){
    shamanVictim.alive = false;
    lines.push(`무당의 습격으로 <b>${shamanVictim.name}</b>이(가) 사망했습니다.`);
    newMafiaHandleFirstDeath(shamanVictim);
  }

  // 7. 경찰 - 조사
  if(police){
    const t = getPlayer(police);
    if(t){
      const isMafiaRole = t.currentRole === '마피아';
      lines.push(`[경찰 전용 안내] ${t.name} 조사 결과 → <b>${isMafiaRole?'마피아 (경찰 크리!)':'시민'}</b>`);
    }
  }

  // 8. 영매 - 사망자 직업 확인
  if(medium){
    const t = getPlayer(medium);
    if(t) lines.push(`[영매 전용 안내] 고인 ${t.name}의 생전 직업은 <b>${t.currentRole}</b>이었습니다.`);
  }

  // 9. 기자 - 스파이 특종
  if(reporter){
    const t = getPlayer(reporter);
    if(t){
      if(t.role === '스파이' && t.alive){
        t.alive = false;
        lines.push(`[특종!] 기자가 스파이 <b>${t.name}</b>을(를) 밝혀내 즉시 사망했습니다.`);
        newMafiaHandleFirstDeath(t);
      } else {
        lines.push(`기자의 취재는 특종으로 이어지지 않았습니다. (${t.name}은(는) 스파이가 아닙니다)`);
      }
    }
  }

  // 10. 사립탐정 - 마피아 습격 대상 예측
  if(detective){
    const detectivePlayer = state.players.find(p=>p.currentRole==='사립탐정' && p.alive);
    if(detectivePlayer){
      if(mafia && detective === mafia){
        lines.push(`[사립탐정 전용 안내] 예측 적중! 이번 밤 마피아 실행자는 <b>${mafiaActor ? mafiaActor.name : '(지정되지 않음)'}</b>입니다.`);
      } else {
        lines.push(`[사립탐정 전용 안내] 예측이 빗나갔습니다.`);
      }
    }
  }

  // 11. 스토커 - 감시 대상이 이번 밤 사용한 능력의 대상 확인
  if(stalker){
    const t = getPlayer(stalker);
    if(t){
      const found = actionsLog.find(a=>a.actorId===t.id);
      if(found){
        const targetPlayer = getPlayer(found.targetId);
        lines.push(`[스토커 전용 안내] ${t.name}은(는) 이번 밤 <b>${targetPlayer ? targetPlayer.name : '알 수 없음'}</b>을(를) 대상으로 능력을 사용했습니다.`);
      } else {
        lines.push(`[스토커 전용 안내] ${t.name}은(는) 이번 밤 아무 능력도 사용하지 않았습니다.`);
      }
    }
  }

  if(!lines.length) lines.push('이번 밤은 아무 능력도 사용되지 않았습니다.');
  state.log.push(...lines);

  const w = checkNewMafiaWinner();
  if(w){
    state.winner = w;
  } else {
    state.phase = 'day';
    state.log.push(`§${state.day}일차 낮이 되었습니다. 토론 후 투표해주세요.`);
  }
  state.night2 = {mafia:null, mafiaActor:null, spy:null, thief:null, doctor:null, police:null, soldier:null, medium:null,
                   lovers:null, shaman:null, reporter:null, detective:null, stalker:null};
  save(); render();
}

function runNewMafiaDayResolution(pid){
  const p = getPlayer(pid);
  if(p){
    if(p.currentRole === '국회'){
      state.log.push(`<b>${p.name}</b>이(가) 처형되지 않고 생존했습니다. (국회는 투표로 죽지 않음) 역할이 공개됩니다: <b>${p.currentRole}</b>`);
    } else {
      p.alive = false;
      state.log.push(`<b>${p.name}</b>(${p.role})이(가) 투표로 처형되었습니다.`);
      newMafiaHandleFirstDeath(p);
    }
  }

  const w = checkNewMafiaWinner();
  if(w){
    state.winner = w;
  } else {
    state.day += 1;
    state.phase = 'night';
    state.log.push(`§${state.day}일차 밤이 되었습니다.`);
  }
  save(); render();
}

/* ---- 러브 레터 게임 로직 ---- */
function initLLGame(){
  state.gameStarted = true;
  state.ll = {
    version: state.llVersion,
    tokens: {},
    startIdx: 0,
    roundNumber: 0,
    log: [],
    fullLog: [],
  };
  state.players.forEach(p=>{ state.ll.tokens[p.id] = 0; });
  state.history = [];
  setupLLRound();
}

function setupLLRound(){
  const ll = state.ll;
  const deck = buildLLDeck(ll.version, state.players.length);

  const removedFaceDown = deck.pop();
  let removedFaceUp = [];
  if(state.players.length === 2){
    removedFaceUp = [deck.pop(), deck.pop(), deck.pop()].filter(Boolean);
  }

  const hand = {};
  state.players.forEach(p=>{ hand[p.id] = deck.pop(); });

  // 남은 카드에 랜덤 번호를 부여해 배열한다 (딜러는 카드까지 보고, 플레이어에게는 번호만 공유)
  ll.deckLayout = deck.map((card, i)=>({ num: i+1, card, taken:false }));
  ll.nextNum = deck.length + 1;

  ll.removedFaceDown = removedFaceDown;
  ll.removedFaceUp = removedFaceUp;
  ll.hand = hand;
  ll.drawnCard = null;
  ll.eliminated = {};
  ll.protected = {};
  ll.playedCards = {};
  state.players.forEach(p=>{
    ll.eliminated[p.id] = false;
    ll.protected[p.id] = false;
    ll.playedCards[p.id] = [];
  });
  ll.pendingCard = null;
  ll.ministerDraw = null;
  ll.pickPurpose = null;
  ll.pickForId = null;
  ll.pickNeeded = 0;
  ll.pickedCards = [];
  ll.pickContext = null;
  ll.fullLog = (ll.fullLog || []).concat(ll.log || []);
  ll.roundNumber += 1;
  ll.turnIndex = ll.startIdx % state.players.length;
  ll.phase = 'draw';
  ll.roundWinnerIds = [];
  ll.gameWinnerIds = null;
  ll.log = [`§${ll.roundNumber}라운드 시작 (제외 카드 1장 비공개${removedFaceUp.length?`, 공개 제외 카드: ${removedFaceUp.join(', ')}`:''})`];

  // 초기 배분에서 왕이 나온 경우 즉시 탈락 처리
  state.players.forEach(p=>{
    if(ll.hand[p.id] === '왕'){
      ll.eliminated[p.id] = true;
      ll.log.push(`${p.name}이(가) 시작 카드로 <b>왕</b>을 받아 즉시 탈락했습니다.`);
    }
  });

  // 시작 플레이어가 이미 탈락 상태라면 다음 생존자로 이동
  if(ll.eliminated[state.players[ll.turnIndex].id]){
    llAdvanceTurnRaw();
  }

  if(llCheckRoundEnd()) return;

  llBeginTurnDraw(state.players[ll.turnIndex].id);
}

function llCountUntaken(){
  return state.ll.deckLayout.filter(c=>!c.taken).length;
}

// 보호막 해제 없이 다음 생존자로 인덱스만 이동 (라운드 시작 시 사용)
function llAdvanceTurnRaw(){
  const ll = state.ll;
  let idx = ll.turnIndex;
  let guard = 0;
  do{
    idx = (idx+1) % state.players.length;
    guard++;
  } while(ll.eliminated[state.players[idx].id] && guard <= state.players.length);
  ll.turnIndex = idx;
}

function llAdvanceTurn(){
  const ll = state.ll;
  if(llCheckRoundEnd()) return;
  llAdvanceTurnRaw();
  const p = state.players[ll.turnIndex];
  ll.protected[p.id] = false; // 자기 차례가 되면 보호막 해제
  llBeginTurnDraw(p.id);
}

function llBeginTurnDraw(playerId){
  const ll = state.ll;
  if(llCountUntaken() === 0){
    llEndRoundByComparison();
    return;
  }
  ll.pickPurpose = 'turnDraw';
  ll.pickForId = playerId;
  ll.pickNeeded = 1;
  ll.pickedCards = [];
  ll.pickContext = null;
  ll.phase = 'numberPick';
}

function llCheckRoundEnd(){
  const ll = state.ll;
  if(llCountAlive() <= 1){
    llEndRoundBySurvivor();
    return true;
  }
  return false;
}

function llPickNumber(num){
  const ll = state.ll;
  const entry = ll.deckLayout.find(c=>c.num===num && !c.taken);
  if(!entry) return;
  entry.taken = true;
  ll.pickedCards.push(entry.card);
  ll.pickNeeded -= 1;

  if(ll.pickNeeded > 0){
    save(); render();
    return; // 아직 더 뽑아야 함 (수상: 2장)
  }

  const purpose = ll.pickPurpose;
  const forId = ll.pickForId;
  const context = ll.pickContext;
  const cards = ll.pickedCards;
  ll.pickPurpose = null;
  ll.pickForId = null;
  ll.pickedCards = [];
  ll.pickContext = null;

  if(purpose === 'turnDraw'){
    llFinishTurnDraw(forId, cards[0]);
  } else if(purpose === 'magician'){
    llFinishMagicianDraw(context, forId, cards[0]);
  } else if(purpose === 'ministerSingle'){
    const pl = getPlayer(forId);
    ll.hand[forId] = cards[0];
    ll.log.push(`${pl.name}이(가) 수상을 내고 카드 한 장(${cards[0]})을 뽑아 보유합니다. (남은 카드가 1장뿐이었습니다)`);
    if(cards[0] === '왕'){
      ll.eliminated[forId] = true;
      ll.log.push(`${pl.name}이(가) 뽑은 카드가 <b>왕</b>이라 즉시 탈락했습니다.`);
    }
    llAdvanceTurn();
  } else if(purpose === 'minister'){
    ll.ministerDraw = cards;
    ll.phase = 'minister';
  }
  save(); render();
}

function llFinishTurnDraw(playerId, card){
  const ll = state.ll;
  const p = getPlayer(playerId);
  ll.drawnCard = card;

  if(card === '왕'){
    ll.eliminated[p.id] = true;
    ll.log.push(`${p.name}이(가) <b>왕</b>을 뽑아 즉시 탈락했습니다. (공개된 카드: ${ll.hand[p.id]}, 왕)`);
    ll.drawnCard = null;
    llAdvanceTurn();
    return;
  }

  if(!llCheckAfterDrawConditions()){
    ll.phase = 'choose';
  }
}

function llFinishMagicianDraw(context, targetId, newCard){
  const ll = state.ll;
  const t = getPlayer(targetId);
  ll.hand[t.id] = newCard;
  ll.log.push(`${context.actorName}의 마법사로 ${context.targetName}이(가) ${context.discardedCard}을(를) 버리고 새 카드를 뽑았습니다.`);
  if(newCard === '왕'){
    ll.eliminated[t.id] = true;
    ll.log.push(`${context.targetName}이(가) 새로 뽑은 카드가 <b>왕</b>이라 즉시 탈락했습니다.`);
  }
  llAdvanceTurn();
}

// 후작(반드시 냄) / 대신(즉시 탈락) 강제 조건 체크. 강제 처리가 일어났으면 true 반환.
function llCheckAfterDrawConditions(){
  const ll = state.ll;
  const p = llCurrentPlayer();
  if(!p || ll.drawnCard === null) return false;
  const cards = [ll.hand[p.id], ll.drawnCard];

  if(cards.includes('대신') && cards.some(c=>LL_FORCE_TRIGGERS.includes(c))){
    ll.eliminated[p.id] = true;
    ll.playedCards[p.id].push('대신');
    ll.log.push(`${p.name}은(는) 대신과 ${cards.find(c=>LL_FORCE_TRIGGERS.includes(c))}을(를) 함께 들고 있어 즉시 탈락했습니다. (공개된 카드: ${cards.join(', ')})`);
    ll.drawnCard = null;
    llAdvanceTurn();
    return true;
  }
  if(cards.includes('후작') && cards.some(c=>LL_FORCE_TRIGGERS.includes(c))){
    ll.log.push(`${p.name}은(는) 후작과 ${cards.find(c=>LL_FORCE_TRIGGERS.includes(c))}을(를) 함께 들고 있어 후작을 강제로 냅니다.`);
    llChooseCard('후작', ll.hand[p.id]==='후작' ? 'hand' : 'drawn');
    return true;
  }
  return false;
}

function llChooseCard(cardName, slot){
  const ll = state.ll;
  const p = llCurrentPlayer();
  // 남은 카드가 새 hand가 됨
  const other = slot === 'hand' ? ll.drawnCard : ll.hand[p.id];
  ll.hand[p.id] = other;
  ll.drawnCard = null;
  ll.pendingCard = cardName;
  ll.playedCards[p.id].push(cardName);

  if(LL_TARGET_CARDS.includes(cardName)){
    const validTargets = llAlivePlayers().filter(t=> t.id !== p.id ? !ll.protected[t.id] : (cardName==='마법사'));
    if(!validTargets.length){
      ll.log.push(`${p.name}이(가) ${cardName}을(를) 냈지만 지목할 수 있는 대상이 없어 효과가 발동하지 않았습니다.`);
      ll.pendingCard = null;
      llAdvanceTurn();
    } else {
      ll.phase = 'target';
    }
  } else if(cardName === '수상'){
    const untaken = llCountUntaken();
    ll.pendingCard = null;
    if(untaken === 0){
      ll.log.push(`${p.name}이(가) 수상을 냈지만 뽑을 카드가 없어 효과가 발동하지 않았습니다.`);
      llAdvanceTurn();
    } else if(untaken === 1){
      ll.pickPurpose = 'ministerSingle';
      ll.pickForId = p.id;
      ll.pickNeeded = 1;
      ll.pickedCards = [];
      ll.pickContext = null;
      ll.phase = 'numberPick';
    } else {
      ll.pickPurpose = 'minister';
      ll.pickForId = p.id;
      ll.pickNeeded = 2;
      ll.pickedCards = [];
      ll.pickContext = null;
      ll.phase = 'numberPick';
    }
  } else {
    // 수녀, 첩자, 공주, 후작 등 대상이 필요 없는 카드
    if(cardName === '수녀'){
      ll.protected[p.id] = true;
      ll.log.push(`${p.name}이(가) 수녀를 내고 다음 차례까지 보호받습니다.`);
    } else if(cardName === '첩자'){
      ll.log.push(`${p.name}이(가) 첩자를 냈습니다. (라운드 종료 시 정산)`);
    } else if(cardName === '공주'){
      ll.log.push(`${p.name}이(가) 공주를 냈습니다. (스스로 낸 것이므로 탈락하지 않습니다)`);
    } else if(cardName === '후작'){
      ll.log.push(`${p.name}이(가) 후작을 냈습니다.`);
    } else {
      ll.log.push(`${p.name}이(가) ${cardName}을(를) 냈습니다.`);
    }
    ll.pendingCard = null;
    llAdvanceTurn();
  }
  save(); render();
}

function llResolveCard(targetId, guessCard){
  const ll = state.ll;
  const p = llCurrentPlayer();
  const card = ll.pendingCard;
  const t = targetId ? getPlayer(targetId) : null;

  if(!t){
    ll.log.push(`${p.name}이(가) ${card}을(를) 냈지만 대상을 선택하지 않아 효과가 발동하지 않았습니다.`);
    ll.pendingCard = null;
    llAdvanceTurn();
    save(); render();
    return;
  }

  if(card === '병사'){
    if(guessCard && ll.hand[t.id] === guessCard){
      ll.eliminated[t.id] = true;
      ll.log.push(`${p.name}의 병사 지목 성공! ${t.name}은(는) <b>${guessCard}</b>을(를) 들고 있어 탈락했습니다.`);
    } else {
      ll.log.push(`${p.name}의 병사 지목 실패. ${t.name}은(는) ${guessCard}을(를) 들고 있지 않았습니다.`);
    }
  } else if(card === '광대'){
    ll.log.push(`[광대 전용 안내] ${t.name}의 카드는 <b>${ll.hand[t.id]}</b>입니다. (${p.name}에게만 조용히 알려주세요)`);
  } else if(card === '기사'){
    const myRank = LL_CARD_INFO[ll.hand[p.id]].rank;
    const theirRank = LL_CARD_INFO[ll.hand[t.id]].rank;
    if(myRank === theirRank){
      ll.log.push(`${p.name}과(와) ${t.name}의 기사 대결 — 랭크가 같아(${myRank}) 아무 일도 일어나지 않았습니다.`);
    } else if(myRank > theirRank){
      ll.eliminated[t.id] = true;
      ll.log.push(`${p.name}과(와) ${t.name}의 기사 대결 — ${t.name}의 랭크가 더 낮아(${theirRank} < ${myRank}) 탈락했습니다.`);
    } else {
      ll.eliminated[p.id] = true;
      ll.log.push(`${p.name}과(와) ${t.name}의 기사 대결 — ${p.name}의 랭크가 더 낮아(${myRank} < ${theirRank}) 탈락했습니다.`);
    }
  } else if(card === '마법사'){
    const discarded = ll.hand[t.id];
    if(discarded === '공주'){
      ll.playedCards[t.id].push(discarded);
      ll.eliminated[t.id] = true;
      ll.log.push(`${p.name}의 마법사로 ${t.name}이(가) 공주를 강제로 버려 탈락했습니다.`);
      ll.pendingCard = null;
      llAdvanceTurn();
      save(); render();
      return;
    } else if(llCountUntaken() === 0){
      ll.log.push(`${p.name}이(가) ${t.name}에게 마법사를 사용했지만 뽑을 카드가 없어 효과가 취소되었습니다. (카드 유지)`);
      ll.pendingCard = null;
      llAdvanceTurn();
      save(); render();
      return;
    } else {
      ll.playedCards[t.id].push(discarded);
      ll.pendingCard = null;
      ll.pickPurpose = 'magician';
      ll.pickForId = t.id;
      ll.pickNeeded = 1;
      ll.pickedCards = [];
      ll.pickContext = { actorName: p.name, targetName: t.name, discardedCard: discarded };
      ll.phase = 'numberPick';
      save(); render();
      return;
    }
  } else if(card === '장군'){
    const tmp = ll.hand[p.id];
    ll.hand[p.id] = ll.hand[t.id];
    ll.hand[t.id] = tmp;
    ll.log.push(`${p.name}이(가) 장군으로 ${t.name}과(와) 카드를 교환했습니다.`);
  }

  ll.pendingCard = null;
  llAdvanceTurn();
  save(); render();
}

function llMinisterKeep(idx){
  const ll = state.ll;
  const p = llCurrentPlayer();
  const drawn = ll.ministerDraw;
  const keep = drawn[idx];
  const ret = drawn[1-idx];
  ll.hand[p.id] = keep;
  ll.ministerDraw = null;
  ll.log.push(`${p.name}이(가) 수상으로 뽑은 카드 중 한 장(${keep})을 보유했습니다.`);
  ll.deckLayout.push({ num: ll.nextNum, card: ret, taken:false });
  ll.log.push(`남은 카드(${ret})는 새 번호 #${ll.nextNum}(으)로 배열에 다시 섞여 들어갔습니다.`);
  ll.nextNum += 1;
  if(keep === '왕'){
    ll.eliminated[p.id] = true;
    ll.log.push(`${p.name}이(가) 보유한 카드가 <b>왕</b>이라 즉시 탈락했습니다.`);
  }
  llAdvanceTurn();
  save(); render();
}

function llAwardToken(id){
  const ll = state.ll;
  ll.tokens[id] = (ll.tokens[id]||0) + 1;
}

function llFinishRound(){
  const ll = state.ll;
  // 첩자 보너스 정산
  const spyPlayers = state.players.filter(p=> ll.playedCards[p.id] && ll.playedCards[p.id].includes('첩자'));
  if(spyPlayers.length === 1 && !ll.eliminated[spyPlayers[0].id]){
    llAwardToken(spyPlayers[0].id);
    ll.log.push(`${spyPlayers[0].name}이(가) 이번 라운드 유일하게 첩자를 내고 생존해 호감 토큰을 추가로 얻었습니다.`);
  }

  const reachedGoal = state.players.filter(p=> (ll.tokens[p.id]||0) >= state.llTokenGoal);
  if(reachedGoal.length){
    ll.gameWinnerIds = reachedGoal.map(p=>p.id);
    ll.phase = 'gameEnd';
  } else {
    ll.phase = 'roundEnd';
    ll.startIdx = (ll.startIdx + 1) % state.players.length;
  }
}

function llEndRoundBySurvivor(){
  const ll = state.ll;
  const survivors = llAlivePlayers();
  const winner = survivors[0];
  if(winner){
    ll.roundWinnerIds = [winner.id];
    llAwardToken(winner.id);
    ll.log.push(`§라운드 종료 — <b>${winner.name}</b>만 남아 호감 토큰을 획득했습니다! (보유 카드: ${ll.hand[winner.id]})`);
  }
  llFinishRound();
  if(ll.phase === 'gameEnd'){
    const names = ll.gameWinnerIds.map(id=>getPlayer(id).name).join(', ');
    ll.log.push(`<b>${names}</b>이(가) 목표 토큰(${state.llTokenGoal}개)을 달성해 최종 승리했습니다!`);
  }
}

function llEndRoundByComparison(){
  const ll = state.ll;
  const survivors = llAlivePlayers();
  const ranked = survivors.map(p=>({
    p, rank: (LL_CARD_INFO[ll.hand[p.id]] || {rank:-1}).rank,
    tiebreak: (ll.playedCards[p.id]||[]).reduce((sum,c)=>sum+(LL_CARD_INFO[c]?LL_CARD_INFO[c].rank:0), 0)
  }));
  ranked.sort((a,b)=> b.rank - a.rank || b.tiebreak - a.tiebreak);
  const top = ranked[0];
  const tied = ranked.filter(r=>r.rank===top.rank && r.tiebreak===top.tiebreak);
  ll.log.push(`§뽑을 수 있는 카드가 모두 소진되어 라운드가 종료되었습니다. 생존자 카드 공개: ${survivors.map(p=>`${p.name}(${ll.hand[p.id]})`).join(', ')}`);
  ll.roundWinnerIds = tied.map(t=>t.p.id);
  tied.forEach(t=> llAwardToken(t.p.id));
  if(tied.length > 1){
    ll.log.push(`<b>${tied.map(t=>t.p.name).join(', ')}</b>이(가) 동점(무승부)으로 각각 호감 토큰을 획득했습니다!`);
  } else {
    ll.log.push(`<b>${tied[0].p.name}</b>이(가) 가장 높은 카드로 호감 토큰을 획득했습니다!`);
  }
  llFinishRound();
  if(ll.phase === 'gameEnd'){
    const names = ll.gameWinnerIds.map(id=>getPlayer(id).name).join(', ');
    ll.log.push(`<b>${names}</b>이(가) 목표 토큰(${state.llTokenGoal}개)을 달성해 최종 승리했습니다!`);
  }
}

/* ---- 달무티 게임 로직 ---- */
function buildDMDeck(){
  const deck = [];
  Object.entries(DM_COUNTS).forEach(([val,count])=>{
    for(let i=0;i<count;i++) deck.push(parseInt(val,10));
  });
  llShuffle(deck);
  return deck;
}

function initDMGame(){
  state.gameStarted = true;
  state.dm = {
    roundNumber: 1,
    order: [],
    ranks: {},
    hands: {},
    activeOrder: [],
    turnPlayerIdx: null,
    currentPlay: null,
    passedSet: [],
    selected: [],
    finishOrder: [],
    phase: 'drawPick',
    taxPhase: null,
    drawLayout: [],
    drawResults: {},
    allDealtCards: {},
    log: ['§게임을 시작합니다. 각자 번호를 뽑아 순서를 정하세요.'],
  };
  dmSetupDraw();
}

function dmSetupDraw(){
  const dm = state.dm;
  const n = state.players.length;
  const values = Array.from({length:n}, (_,i)=>i+1);
  llShuffle(values);
  dm.drawLayout = Array.from({length:n}, (_,i)=>({num:i+1, value:values[i], taken:false}));
  dm.drawResults = {};
}

function dmFinalizeDrawOrder(){
  const dm = state.dm;
  const indices = Object.keys(dm.drawResults).map(k=>parseInt(k,10));
  indices.sort((a,b)=> dm.drawResults[a] - dm.drawResults[b]);
  dm.order = indices;
  dm.ranks = {};
  dm.order.forEach((idx,pos)=>{
    const pp = state.players[idx];
    dm.ranks[pp.id] = dmRankLabel(pos, dm.order.length);
  });
  dmDealHands();
  dm.phase = 'dealing';
  const first = state.players[dm.order[0]];
  const last = state.players[dm.order[dm.order.length-1]];
  dm.log.push(`§순서 확정: <b>${first.name}</b>이(가) 달무티(선), <b>${last.name}</b>이(가) 농노가 되었습니다.`);
}

function dmConfirmAllDraws(){
  const dm = state.dm;
  const selects = Array.from(document.querySelectorAll('.dmDrawSelect'));
  const chosen = selects.map(s=>s.value);
  if(chosen.some(v=>!v)){ alert('모든 사람이 번호를 선택해야 합니다.'); return; }
  const nums = chosen.map(v=>parseInt(v,10));
  if(new Set(nums).size !== nums.length){ alert('서로 다른 번호를 선택해야 합니다.'); return; }
  selects.forEach((s,pos)=>{
    const idx = parseInt(s.dataset.idx,10);
    const num = parseInt(s.value,10);
    const entry = dm.drawLayout.find(c=>c.num===num);
    dm.drawResults[idx] = entry.value;
    dm.log.push(`${state.players[idx].name}이(가) #${num}번을 선택해 순번 값 ${entry.value}을(를) 받았습니다.`);
  });
  dmFinalizeDrawOrder();
  save(); render();
}

function dmBatchDraw(){
  const dm = state.dm;
  const pool = [...dm.drawLayout];
  state.players.forEach((p,idx)=>{
    const j = Math.floor(Math.random()*pool.length);
    const entry = pool.splice(j,1)[0];
    dm.drawResults[idx] = entry.value;
    dm.log.push(`${p.name}이(가) 무작위 뽑기로 순번 값 ${entry.value}을(를) 받았습니다.`);
  });
  dmFinalizeDrawOrder();
  save(); render();
}

function dmDealHands(){
  const dm = state.dm;
  const deck = buildDMDeck();
  const n = state.players.length;
  const base = Math.floor(DM_DECK_SIZE / n);
  const remainder = DM_DECK_SIZE % n;
  dm.hands = {};
  state.players.forEach(p=>{ dm.hands[p.id] = []; });
  let cursor = 0;
  for(let round=0; round<base; round++){
    dm.order.forEach(idx=>{
      dm.hands[state.players[idx].id].push(deck[cursor++]);
    });
  }
  for(let i=0;i<remainder;i++){
    const idx = dm.order[i];
    dm.hands[state.players[idx].id].push(deck[cursor++]);
  }
  Object.values(dm.hands).forEach(h=>h.sort((a,b)=>a-b));

  // 이번에 받은 카드를 라운드별 누적 기록에 남긴다 (최종 결과 복사용)
  dm.allDealtCards = dm.allDealtCards || {};
  state.players.forEach(p=>{
    if(!dm.allDealtCards[p.id]) dm.allDealtCards[p.id] = [];
    dm.allDealtCards[p.id].push({ round: dm.roundNumber, cards: [...dm.hands[p.id]] });
  });
}

// 현재 선택 상태(dm.selected)까지 고려해서, "지금 추가로 선택 가능한" 카드 인덱스를 계산한다.
// 리더(currentPlay 없음)는 항상 전부 선택 가능. 팔로워는 장수를 채웠거나, 이미 고른 숫자와
// 다른 숫자를 클릭하면 안 되므로 그 부분까지 반영한다.
function dmAddableIndices(hand){
  const dm = state.dm;
  if(!dm.currentPlay) return hand.map((_,i)=>i); // 리더는 자유

  const need = dm.currentPlay.count;
  const maxVal = dm.currentPlay.value;

  if(dm.selected.length >= need) return []; // 이미 필요한 장수를 다 채움 -> 더 이상 추가 불가

  const jokerIdx = [];
  const groups = {};
  hand.forEach((v,i)=>{
    if(v===13) jokerIdx.push(i);
    else { if(!groups[v]) groups[v]=[]; groups[v].push(i); }
  });
  const availableJokerIdx = jokerIdx.filter(i=>!dm.selected.includes(i));

  const selectedVals = dm.selected.map(i=>hand[i]);
  const lockedVal = selectedVals.find(v=>v!==13); // 이미 선택된 것 중 조커가 아닌 값이 있으면 그 값으로 고정

  let addable = [];
  if(lockedVal !== undefined){
    // 이미 특정 숫자를 선택한 상태 -> 그 숫자의 남은 카드 + 조커만 추가 가능
    const sameValIdx = (groups[lockedVal]||[]).filter(i=>!dm.selected.includes(i));
    addable = addable.concat(sameValIdx, availableJokerIdx);
  } else {
    // 아직 숫자가 확정되지 않음(선택이 비었거나 조커만 선택된 상태)
    // -> 조건(장수+숫자)을 만족하는 모든 그룹의 미선택 카드를 추가 가능 목록에 넣는다
    Object.entries(groups).forEach(([v,idxs])=>{
      const val = parseInt(v,10);
      const unselected = idxs.filter(i=>!dm.selected.includes(i));
      const selectedOfThisVal = idxs.length - unselected.length;
      const totalIfUsed = selectedOfThisVal + unselected.length + availableJokerIdx.length;
      if(val < maxVal && totalIfUsed >= need){
        addable = addable.concat(unselected);
      }
    });
    if(addable.length > 0) addable = addable.concat(availableJokerIdx);
  }
  return [...new Set(addable)];
}

function dmToggleCard(idx){
  const dm = state.dm;
  const p = state.players[dm.turnPlayerIdx];
  const hand = dm.hands[p.id];
  const val = hand[idx];
  const alreadySelected = dm.selected.includes(idx);

  if(alreadySelected){
    // 같은 숫자로 선택돼 있던 카드 전체를 한 번에 해제 (조커는 조커끼리만 함께 해제)
    dm.selected = dm.selected.filter(i => hand[i] !== val);
  } else {
    const addable = dmAddableIndices(hand);
    if(!addable.includes(idx)) return; // 낼 수 없는 카드는 클릭해도 아무 효과 없음

    if(dm.currentPlay){
      // 다음 주자는 필요한 장수만큼 같은 숫자 카드를 한 번에 선택 (남은 필요 장수만큼만)
      const need = dm.currentPlay.count;
      const remaining = need - dm.selected.length;
      const sameValIdx = hand
        .map((v,i)=>({v,i}))
        .filter(o=>o.v===val && !dm.selected.includes(o.i))
        .map(o=>o.i);
      const toAdd = sameValIdx.slice(0, Math.max(0, remaining));
      dm.selected.push(...toAdd);
    } else {
      dm.selected.push(idx);
    }
  }
  save(); render();
}

function dmClearSelection(){
  state.dm.selected = [];
  save(); render();
}

function dmValidateSelection(){
  const dm = state.dm;
  const p = state.players[dm.turnPlayerIdx];
  const hand = dm.hands[p.id];
  const cards = dm.selected.map(i=>hand[i]);
  if(!cards.length) return {ok:false, msg:'카드를 선택하세요.'};
  const nonJokers = cards.filter(c=>c!==13);
  const uniqueVals = new Set(nonJokers);
  if(uniqueVals.size > 1) return {ok:false, msg:'조커(13)를 제외한 모든 카드는 같은 숫자여야 합니다.'};
  const value = uniqueVals.size===1 ? [...uniqueVals][0] : 13;
  const count = cards.length;

  if(dm.currentPlay){
    if(count !== dm.currentPlay.count) return {ok:false, msg:`이전과 같은 ${dm.currentPlay.count}장을 내야 합니다.`};
    if(value >= dm.currentPlay.value) return {ok:false, msg:`이전 카드(${dm.currentPlay.value})보다 낮은 숫자를 내야 합니다.`};
  }
  return {ok:true, value, count};
}

function dmNextActiveAfter(idx){
  const dm = state.dm;
  const orderLen = dm.order.length;
  const pos = dm.order.indexOf(idx);
  for(let step=1; step<=orderLen; step++){
    const candidate = dm.order[(pos+step)%orderLen];
    if(dm.activeOrder.includes(candidate)) return candidate;
  }
  return null;
}

function dmPlayCards(){
  const dm = state.dm;
  const v = dmValidateSelection();
  if(!v.ok){ alert(v.msg); return; }
  const p = state.players[dm.turnPlayerIdx];
  const hand = dm.hands[p.id];
  const sortedIdx = [...dm.selected].sort((a,b)=>b-a);
  sortedIdx.forEach(i=> hand.splice(i,1));
  dm.selected = [];
  dm.log.push(`${p.name}이(가) <b>${v.value}</b>을(를) ${v.count}장 냈습니다.`);

  const emptied = hand.length===0;
  const playerIdx = dm.turnPlayerIdx;
  if(emptied){
    dm.finishOrder.push(playerIdx);
    dm.activeOrder = dm.activeOrder.filter(i=>i!==playerIdx);
    dm.log.push(`${p.name}이(가) 카드를 모두 소진했습니다. (${dm.finishOrder.length}등)`);
  }

  if(dm.activeOrder.length <= 1){
    if(dm.activeOrder.length === 1){
      const lastIdx = dm.activeOrder[0];
      dm.finishOrder.push(lastIdx);
      dm.log.push(`§${state.players[lastIdx].name}이(가) 마지막까지 카드를 들고 있어 농노가 되었습니다.`);
      dm.activeOrder = [];
    }
    dm.phase = 'handEnd';
    save(); render();
    return;
  }

  dm.currentPlay = { idx: playerIdx, value: v.value, count: v.count };

  // 1은 가장 높은 카드라 아무도 이길 수 없고, 카드를 다 낸 사람이 나오면(예: 1등 확정)
  // 다른 사람들이 굳이 패스할 필요 없이 트릭을 즉시 종료하고 다음 사람이 새로 시작한다.
  const forcedEnd = emptied || v.value === 1;
  const nextIdx = forcedEnd ? null : dmFindNextEligible(playerIdx);

  if(forcedEnd || nextIdx === null){
    const leaderCandidate = dm.activeOrder.includes(playerIdx) ? playerIdx : dmNextActiveAfter(playerIdx);
    let reason = '';
    if(v.value === 1) reason = ' (1은 가장 높은 카드라 아무도 이길 수 없습니다)';
    else if(emptied) reason = ` (${p.name}이(가) 카드를 모두 내서 대기 없이 바로 종료)`;
    const leaderName = leaderCandidate!==null ? state.players[leaderCandidate].name : '';
    dm.log.push(`§트릭 종료${reason} — <b>${leaderName}</b>이(가) 다음 트릭을 자유롭게 시작합니다.`);
    dm.currentPlay = null;
    dm.passedSet = [];
    dm.turnPlayerIdx = leaderCandidate;
  } else {
    dm.turnPlayerIdx = nextIdx;
  }
  save(); render();
}

// seatOrder 상 fromIdx 다음으로, 아직 패스하지 않은 활성 플레이어를 찾는다 (자기 자신으로는 되돌아오지 않음)
function dmFindNextEligible(fromIdx){
  const dm = state.dm;
  const orderLen = dm.order.length;
  const pos = dm.order.indexOf(fromIdx);
  for(let step=1; step<orderLen; step++){
    const candidate = dm.order[(pos+step)%orderLen];
    if(!dm.activeOrder.includes(candidate)) continue;
    if(dm.passedSet.includes(candidate)) continue;
    return candidate;
  }
  return null;
}

function dmPass(){
  const dm = state.dm;
  const p = state.players[dm.turnPlayerIdx];
  dm.passedSet.push(dm.turnPlayerIdx);
  dm.log.push(`${p.name}이(가) 패스했습니다.`);

  const leaderIdx = dm.currentPlay.idx;
  const leaderStillActive = dm.activeOrder.includes(leaderIdx);
  const needToAct = dm.activeOrder.filter(i => i!==leaderIdx && !dm.passedSet.includes(i));

  if(needToAct.length === 0){
    let nextLeader;
    if(leaderStillActive){
      nextLeader = leaderIdx;
    } else {
      nextLeader = dmNextActiveAfter(leaderIdx);
    }
    dm.log.push(`§트릭 종료 — <b>${state.players[nextLeader].name}</b>이(가) 다음 트릭의 선입니다.`);
    dm.currentPlay = null;
    dm.passedSet = [];
    dm.turnPlayerIdx = nextLeader;
  } else {
    dm.turnPlayerIdx = dmFindNextEligible(dm.turnPlayerIdx);
  }
  save(); render();
}

function dmDealNextRound(){
  const dm = state.dm;
  // 잠정 순위(직전 라운드 등수 기준)로 우선 배분한다. 혁명/대혁명 여부는 카드를 받은 뒤 확인한다.
  dm.order = dm.finishOrder;
  dm.ranks = {};
  dm.order.forEach((idx,pos)=>{
    const p = state.players[idx];
    dm.ranks[p.id] = dmRankLabel(pos, dm.order.length);
  });
  dm.roundNumber += 1;
  dmDealHands();
  dm.finishOrder = [];
  dm.activeOrder = [];
  dm.selected = [];
  dm.currentPlay = null;
  dm.passedSet = [];
  dm.taxPhase = null;
  dm.phase = 'taxCheck';
  dm.log.push(`§${dm.roundNumber}라운드 — 카드가 분배되었습니다. 카드를 확인하고 혁명 여부를 체크한 뒤 세금을 정산하세요.`);
  save(); render();
}

function dmBeginPlayingPhase(){
  const dm = state.dm;
  dm.activeOrder = [...dm.order];
  dm.turnPlayerIdx = dm.order[0];
  dm.currentPlay = null;
  dm.passedSet = [];
  dm.selected = [];
  dm.taxPhase = null;
  dm.phase = 'playing';
  dm.log.push(`§<b>${state.players[dm.order[0]].name}</b>(달무티)부터 진행을 시작합니다.`);
  save(); render();
}

function dmTaxBegin(){
  const dm = state.dm;
  const revoEl = document.getElementById('dm_revolution');
  const greatRevoEl = document.getElementById('dm_great_revolution');
  const revolution = revoEl && revoEl.checked;
  const greatRevolution = greatRevoEl && greatRevoEl.checked;

  if(greatRevolution){
    dm.order = [...dm.order].reverse();
    dm.ranks = {};
    dm.order.forEach((idx,pos)=>{
      const p = state.players[idx];
      dm.ranks[p.id] = dmRankLabel(pos, dm.order.length);
    });
    dm.log.push('대혁명 발생! 계급이 전체적으로 뒤바뀝니다. (카드는 다시 섞지 않고, 자리만 역순으로 재배치)');
    dmBeginPlayingPhase();
    return;
  }
  if(revolution){
    dm.log.push('혁명 발생! 이번 라운드는 세금이 면제됩니다.');
    dmBeginPlayingPhase();
    return;
  }
  // 세금 정산 시작 — 딜러가 직접 카드를 선택해서 이동
  dm.taxPhase = 'peasantGive';
  dm.selected = [];
  dm.taxSummary = [];
  save(); render();
}

function dmTaxSelectCard(idx){
  const dm = state.dm;
  const pos = dm.selected.indexOf(idx);
  if(pos>=0) dm.selected.splice(pos,1);
  else dm.selected.push(idx);
  save(); render();
}

function dmTaxConfirmStep(){
  const dm = state.dm;
  const total = dm.order.length;

  function moveCards(fromId, toId, count){
    if(dm.selected.length !== count) return null;
    const hand = dm.hands[fromId];
    const cards = dm.selected.map(i=>hand[i]).sort((a,b)=>a-b);
    [...dm.selected].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));
    dm.hands[toId].push(...cards);
    dm.hands[toId].sort((a,b)=>a-b);
    dm.selected = [];
    return cards;
  }

  if(dm.taxPhase === 'peasantGive'){
    const peasant = state.players[dm.order[total-1]];
    const dalmuti = state.players[dm.order[0]];
    const cards = moveCards(peasant.id, dalmuti.id, 2);
    if(!cards){ alert('정확히 2장을 선택하세요.'); return; }
    dm.log.push(`농노 ${peasant.name}이(가) [${cards.join(', ')}]를 달무티 ${dalmuti.name}에게 상납했습니다.`);
    dm.taxSummary.push(`상납 → 카드 ${cards.join(', ')} (농노 ${peasant.name} → 달무티 ${dalmuti.name})`);
    dm.taxPhase = 'dalmutiGive';
  } else if(dm.taxPhase === 'dalmutiGive'){
    const dalmuti = state.players[dm.order[0]];
    const peasant = state.players[dm.order[total-1]];
    const cards = moveCards(dalmuti.id, peasant.id, 2);
    if(!cards){ alert('정확히 2장을 선택하세요.'); return; }
    dm.log.push(`달무티 ${dalmuti.name}이(가) [${cards.join(', ')}]를 농노 ${peasant.name}에게 하사했습니다.`);
    dm.taxSummary.push(`하사 → 카드 ${cards.join(', ')} (달무티 ${dalmuti.name} → 농노 ${peasant.name})`);
    dm.taxPhase = total>3 ? 'minerGive' : null;
    if(!dm.taxPhase){ dmBeginPlayingPhase(); return; }
  } else if(dm.taxPhase === 'minerGive'){
    const miner = state.players[dm.order[total-2]];
    const arch = state.players[dm.order[1]];
    const cards = moveCards(miner.id, arch.id, 1);
    if(!cards){ alert('정확히 1장을 선택하세요.'); return; }
    dm.log.push(`광부 ${miner.name}이(가) [${cards.join(', ')}]를 대주교 ${arch.name}에게 상납했습니다.`);
    dm.taxSummary.push(`상납 → 카드 ${cards.join(', ')} (광부 ${miner.name} → 대주교 ${arch.name})`);
    dm.taxPhase = 'archGive';
  } else if(dm.taxPhase === 'archGive'){
    const arch = state.players[dm.order[1]];
    const miner = state.players[dm.order[total-2]];
    const cards = moveCards(arch.id, miner.id, 1);
    if(!cards){ alert('정확히 1장을 선택하세요.'); return; }
    dm.log.push(`대주교 ${arch.name}이(가) [${cards.join(', ')}]를 광부 ${miner.name}에게 하사했습니다.`);
    dm.taxSummary.push(`하사 → 카드 ${cards.join(', ')} (대주교 ${arch.name} → 광부 ${miner.name})`);
    dmBeginPlayingPhase();
    return;
  }
  save(); render();
}



function initOwGame(){
  const activeSteps = OW_NIGHT_ORDER.filter(role => state.players.some(p=>p.role===role));
  state.ow.activeSteps = activeSteps;
  state.ow.stepIndex = 0;
  state.ow.stepResolved = false;
  state.ow.lastResult = null;
  state.ow.seerMode = null;
  state.ow.phase = 'night';
  state.ow.pendingExecution = null;
  state.ow.hunterTarget = null;
  state.ow.winners = null;
  state.ow.log = ['§밤이 되었습니다.'];
  state.ow.transfers = [];
  state.gameStarted = true;
}

function owAdvanceStep(){
  state.ow.stepIndex++;
  state.ow.stepResolved = false;
  state.ow.lastResult = null;
  state.ow.seerMode = null;
  if(state.ow.stepIndex >= state.ow.activeSteps.length){
    state.ow.phase = 'day';
    state.ow.log.push('§낮이 되었습니다. 토론 후 최다 득표자를 선택하세요.');
  }
  save(); render();
}

function checkOwWinner(){
  const wolvesInPlay = state.players.filter(p=>p.currentRole==='늑대인간');
  const deadWolves = wolvesInPlay.filter(p=>!p.alive);
  const tanner = state.players.find(p=>p.currentRole==='무두장이');
  const minion = state.players.find(p=>p.currentRole==='하수인');
  const anyoneDied = state.players.some(p=>!p.alive);

  const winners = [];

  // 마을 팀
  let villageWin;
  if(wolvesInPlay.length > 0){
    villageWin = deadWolves.length > 0;
  } else {
    villageWin = !anyoneDied;
  }
  if(villageWin) winners.push('village');

  // 무두장이 (독립 승리 조건)
  if(tanner && !tanner.alive) winners.push('tanner');

  // 늑대인간 팀
  let wolfWin = false;
  if(wolvesInPlay.length > 0 || minion){
    wolfWin = deadWolves.length === 0;
    if(tanner && !tanner.alive) wolfWin = false;
    if(wolvesInPlay.length === 0 && minion){
      wolfWin = wolfWin && anyoneDied && minion.alive;
    }
  }
  if(wolfWin) winners.push('werewolf');

  return winners;
}

function runOwDayResolution(pid){
  const ow = state.ow;
  if(pid){
    const p = getPlayer(pid);
    if(p){
      p.alive = false;
      ow.log.push(`<b>${p.name}</b>(최종 카드: ${p.currentRole})이(가) 투표로 처형되었습니다.`);
      if(p.currentRole === '사냥꾼' && ow.hunterTarget){
        const t = getPlayer(ow.hunterTarget);
        if(t && t.alive){
          t.alive = false;
          ow.log.push(`사냥꾼의 총이 발사되어 <b>${t.name}</b>도(가) 함께 사망했습니다.`);
        }
      }
    }
  } else {
    ow.log.push('아무도 처형되지 않았습니다.');
  }
  ow.winners = checkOwWinner();
  ow.pendingExecution = null;
  ow.hunterTarget = null;
  save(); render();
}

document.querySelector('[data-action="goHome"]').addEventListener('click', ()=>{
  setTab('home');
});

/* ================= 초기 렌더 ================= */
render();
</script>
</body>
</html>
